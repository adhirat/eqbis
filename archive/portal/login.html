    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }

        /* Portal-specific glass effects */
        .portal-glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.1);
        }

        .dark .portal-glass-card {
            background: rgba(26, 26, 62, 0.85);
            border: 1px solid rgba(0, 245, 255, 0.15);
        }

        /* Floating Icons Styles */
        #floating-icons-container {
            z-index: 0;
        }

        .float-icon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease-out;
            color: rgba(100, 116, 139, 0.15);
            /* slate-500/15 */
            user-select: none;
        }

        .dark .float-icon {
            color: rgba(148, 163, 184, 0.1);
            /* slate-400/10 */
        }

        .float-icon:hover {
            color: rgba(124, 58, 237, 0.8);
            /* violet-600 */
            z-index: 10;
            filter: drop-shadow(0 0 8px rgba(124, 58, 237, 0.4));
            transform: scale(1.2) !important;
            /* Override parallax scale if needed */
        }

        .dark .float-icon:hover {
            color: rgba(34, 211, 238, 0.8);
            /* cyan-400 */
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4));
        }



        .float-caption {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 8px;
            border-radius: 6px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            white-space: nowrap;
        }

        .dark .float-caption {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .float-icon:hover .float-caption {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes floatY {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>

</head>

    <script type="module">import {
            loginUser,
            signInWithGoogle,
            signInWithApple,
            initAuthObserver
        }

            from '../assets/js/firebase-modules.js';

        // Initialize auth observer (will redirect to dashboard if already logged in)
        initAuthObserver(false);

        // Password Visibility Toggle
        const togglePassword = document.getElementById('toggle-password');
        const password = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            eyeIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const passwordVal = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            // Loading State
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin material-symbols-outlined text-sm">progress_activity</span> Signing In...';

            const result = await loginUser(email, passwordVal);

            if (result.success) {
                // Show success toast
                showToast('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }

                    , 1000);
            }

            else {
                showToast(result.error || 'Login failed', 'error');
                // Reset button
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        });

        // Toast function
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'from-green-500/20 to-emerald-500/20 border-green-500/50' : 'from-red-500/20 to-rose-500/20 border-red-500/50';
            const textColor = type === 'success' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
            const icon = type === 'success' ? 'check_circle' : 'error';

            toast.className = `fixed bottom-4 right-4 glass-card bg-gradient-to-r $ {
                bgColor
            }

            p-4 rounded-xl border flex items-center gap-3 animate-fade-in-up z-50 shadow-neon`;

            toast.innerHTML = `<span class="material-symbols-outlined ${textColor}">$ {
                icon
            }

            </span><span class="${textColor} font-medium">$ {
                message
            }

            </span>`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }

                , 4000);
        }

    </script>
    <script>
        // Floating Icons Logic
        const icons = [
            { icon: 'dashboard', caption: 'Dashboard' },
            { icon: 'group', caption: 'Users' },
            { icon: 'domain', caption: 'Organization' },
            { icon: 'shield', caption: 'Roles' },
            { icon: 'mail', caption: 'Subscriptions' },
            { icon: 'inbox', caption: 'Submissions' },
            { icon: 'campaign', caption: 'Newsletter' },
            { icon: 'article', caption: 'Blog' },
            { icon: 'business_center', caption: 'Clients' },
            { icon: 'rocket_launch', caption: 'Projects' },
            { icon: 'draw', caption: 'Contracts' },
            { icon: 'receipt_long', caption: 'Invoices' },
            { icon: 'payments', caption: 'Receipts' },
            { icon: 'work', caption: 'Careers' },
            { icon: 'assignment_ind', caption: 'Applications' },
            { icon: 'description', caption: 'Documents' },
            { icon: 'account_tree', caption: 'Hierarchy' },
            { icon: 'calendar_month', caption: 'Calendar' },
            { icon: 'event_busy', caption: 'Leaves' },
            { icon: 'schedule', caption: 'Timesheets' }
        ];

        const container = document.getElementById('floating-icons-container');

        // Mouse tracking for magnetic effect
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let isMouseActive = false;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            isMouseActive = true;
        });

        class Floater {
            constructor(item) {
                this.element = document.createElement('div');
                this.element.className = 'float-icon pointer-events-auto';

                // Random Size
                const scale = 0.8 + Math.random() * 0.6;
                this.element.style.fontSize = `${1.8 * scale}rem`;

                // Content
                this.element.innerHTML = `
                    <span class="material-symbols-outlined">${item.icon}</span>
                    <span class="float-caption">${item.caption}</span>
                `;

                container.appendChild(this.element);

                // Initial Position (Random)
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;

                // Velocity (Random direction and speed)
                this.speed = 0.3 + Math.random() * 0.5;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;

                // Rotation
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2; // Slow rotation

                // Bobbing offset
                this.bobOffset = Math.random() * 100;
                this.bobSpeed = 0.02 + Math.random() * 0.03;

                this.updatePosition();
            }

            update() {
                // Magnetic Effect
                if (isMouseActive) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = 300; // Attraction range (px)

                    if (dist < minDist) {
                        const force = (minDist - dist) / minDist; // 0 to 1
                        const attractionStrength = 0.2; // Multiplier

                        this.vx += (dx / dist) * force * attractionStrength;
                        this.vy += (dy / dist) * force * attractionStrength;
                    }
                }

                // Limit speed (Prevent them from flying too fast due to magnets)
                const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const maxSpeed = 4;
                if (currentSpeed > maxSpeed) {
                    this.vx = (this.vx / currentSpeed) * maxSpeed;
                    this.vy = (this.vy / currentSpeed) * maxSpeed;
                }

                // Friction (Return naturally to base speed if not attracted)
                if (currentSpeed > this.speed) {
                    this.vx *= 0.98;
                    this.vy *= 0.98;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Update rotation
                this.rotation += this.rotationSpeed;

                // Bounce off edges
                const pad = 50;
                if (this.x < -pad || this.x > window.innerWidth + pad) this.vx *= -1;
                if (this.y < -pad || this.y > window.innerHeight + pad) this.vy *= -1;

                // Hard bounds
                if (this.x < -pad) this.x = -pad;
                if (this.x > window.innerWidth + pad) this.x = window.innerWidth + pad;
                if (this.y < -pad) this.y = -pad;
                if (this.y > window.innerHeight + pad) this.y = window.innerHeight + pad;

                this.updatePosition();
            }

            updatePosition() {
                // Add bobbing effect to Y
                const bobY = Math.sin(Date.now() * 0.001 * this.bobSpeed + this.bobOffset) * 10;
                this.element.style.transform = `translate(${this.x}px, ${this.y + bobY}px) rotate(${this.rotation}deg)`;
            }
        }

        const floaters = [];

        function initFloatingIcons() {
            // Increase density (4x)
            [...icons, ...icons, ...icons, ...icons].forEach(item => {
                floaters.push(new Floater(item));
            });
            animate();
        }

        function animate() {
            floaters.forEach(f => f.update());
            requestAnimationFrame(animate);
        }

        // Prevent auto-scroll on load
        if (history.scrollRestoration) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        // Handle Resize
        window.addEventListener('resize', () => {
            // Optional: Reset positions if needed
        });

        // Initialize
        if (container) initFloatingIcons();
        else console.warn('Floating icons container not found');
    </script>
