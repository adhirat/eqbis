<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Calendar - Eqbis Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
    <style>
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        /* Calendar Styles */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
            position: relative;
            z-index: 1;
        }

        .calendar-day:hover {
            background-color: rgba(99, 102, 241, 0.1);
        }

        .calendar-day.active {
            background-color: #6366f1;
            /* Primary */
            color: white;
            font-weight: bold;
        }

        .calendar-day.today {
            border: 2px solid #6366f1;
        }

        /* Event Dots */
        .event-dot {
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        /* Period/Range Backgrounds */
        .calendar-day.in-period {
            background-color: rgba(99, 102, 241, 0.1);
            border-radius: 0;
        }

        .calendar-day.in-period.period-start {
            border-top-left-radius: 50%;
            border-bottom-left-radius: 50%;
        }

        .calendar-day.in-period.period-end {
            border-top-right-radius: 50%;
            border-bottom-right-radius: 50%;
        }

        /* Period Colors */
        .period-shutdown {
            background-color: rgba(245, 158, 11, 0.15) !important;
            color: #b45309;
        }

        .period-holiday {
            background-color: rgba(239, 68, 68, 0.15) !important;
            color: #b91c1c;
        }

        .period-event {
            background-color: rgba(59, 130, 246, 0.15) !important;
            color: #1d4ed8;
        }

        .active .event-dot {
            background-color: white !important;
        }

        /* Custom Scroll for Event List */
        .event-list::-webkit-scrollbar {
            width: 6px;
        }

        .event-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .event-list::-webkit-scrollbar-thumb {
            background-color: rgba(148, 163, 184, 0.3);
            border-radius: 20px;
        }
    </style>
</head>

<body
    class="pt-0 bg-background-light dark:bg-dark-bg text-slate-900 dark:text-white font-display antialiased overflow-hidden">
    <div class="flex h-screen w-full overflow-hidden">
        <div id="portal-sidebar" class="contents"></div>
        <main class="flex-1 flex flex-col min-w-0">
            <div id="portal-header" class="contents"></div>
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 animate-fade-in-up">
                <div class="max-w-[1280px] mx-auto flex flex-col gap-8 h-full">
                    <div class="flex flex-col gap-1 flex-shrink-0">
                        <div class="flex justify-between items-center">
                            <div>
                                <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">
                                    Organization Calendar
                                </h1>
                                <p class="text-slate-500 dark:text-slate-400">View holidays, shutdown periods, and
                                    upcoming events.</p>
                            </div>
                            <button onclick="openEventModal()"
                                class="btn-primary-sm flex items-center gap-2 px-4 py-2 rounded-xl bg-primary text-white hover:bg-primary-dark transition-colors hover-tilt shadow-lg shadow-primary/20"
                                data-permission="manage_calendar">
                                <span class="material-symbols-outlined">add</span>
                                Add Event
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col lg:flex-row gap-8 flex-1 min-h-0">

                        <!-- Left Side: Calendar View -->
                        <div class="w-full lg:w-96 flex-shrink-0 flex flex-col gap-6">
                            <!-- Calendar Widget -->
                            <div
                                class="bg-white dark:bg-dark-card rounded-2xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
                                <div class="flex items-center justify-between mb-6">
                                    <h2 class="font-bold text-lg text-slate-900 dark:text-white"
                                        id="calendar-month-year">January 2026</h2>
                                    <div class="flex gap-1">
                                        <button onclick="prevMonth()"
                                            class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                            <span class="material-symbols-outlined">chevron_left</span>
                                        </button>
                                        <button onclick="nextMonth()"
                                            class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                            <span class="material-symbols-outlined">chevron_right</span>
                                        </button>
                                    </div>
                                </div>

                                <div class="grid grid-cols-7 gap-1 mb-2">
                                    <div class="text-center text-xs font-semibold text-slate-400 uppercase">Su</div>
                                    <div class="text-center text-xs font-semibold text-slate-400 uppercase">Mo</div>
                                    <div class="text-center text-xs font-semibold text-slate-400 uppercase">Tu</div>
                                    <div class="text-center text-xs font-semibold text-slate-400 uppercase">We</div>
                                    <div class="text-center text-xs font-semibold text-slate-400 uppercase">Th</div>
                                    <div class="text-center text-xs font-semibold text-slate-400 uppercase">Fr</div>
                                    <div class="text-center text-xs font-semibold text-slate-400 uppercase">Sa</div>
                                </div>
                                <div id="calendar-days" class="calendar-grid">
                                    <!-- Days injected JS -->
                                </div>
                            </div>

                            <!-- Legend -->
                            <div
                                class="bg-white dark:bg-dark-card rounded-2xl border border-slate-200 dark:border-slate-700 p-6 shadow-sm">
                                <h3 class="font-semibold text-sm text-slate-500 mb-4 uppercase tracking-wider">Event
                                    Types</h3>
                                <div class="space-y-3">
                                    <div class="flex items-center gap-3">
                                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                                        <span class="text-sm font-medium">Holiday</span>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                                        <span class="text-sm font-medium">Shutdown Period</span>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                                        <span class="text-sm font-medium">Company Event</span>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                                        <span class="text-sm font-medium">Meeting</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Side: Event List -->
                        <div
                            class="flex-1 bg-white dark:bg-dark-card rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col overflow-hidden">
                            <div
                                class="p-4 border-b border-slate-200 dark:border-slate-700 flex gap-4 bg-slate-50 dark:bg-slate-900/50">
                                <div class="relative flex-1">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                                    <input type="text" id="event-search" placeholder="Search events..."
                                        class="w-full pl-10 rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary">
                                </div>
                                <select id="filter-type"
                                    class="rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-primary">
                                    <option value="all">All Types</option>
                                    <option value="Holiday">Holidays</option>
                                    <option value="Shutdown">Shutdown</option>
                                    <option value="Event">Events</option>
                                </select>
                            </div>

                            <div id="event-list-container"
                                class="flex-1 overflow-y-auto p-4 space-y-4 event-list relative">
                                <div class="flex flex-col items-center justify-center h-full text-slate-400">
                                    <span
                                        class="material-symbols-outlined text-4xl mb-2 animate-spin">progress_activity</span>
                                    <p>Loading events...</p>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Event Modal -->
    <div id="event-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-backdrop absolute inset-0" onclick="closeEventModal()"></div>
        <div
            class="relative bg-white dark:bg-dark-card rounded-2xl shadow-2xl w-full max-w-lg p-6 border border-slate-200 dark:border-slate-700 animate-fade-in-up">
            <h2 class="text-xl font-bold mb-4 text-slate-900 dark:text-white">Add Calendar Event</h2>

            <form id="event-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Title</label>
                    <input type="text" required id="evt-title"
                        class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-primary"
                        placeholder="e.g. Winter Shutdown">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Type</label>
                        <select required id="evt-type"
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-primary">
                            <option value="Holiday">Holiday</option>
                            <option value="Shutdown">Shutdown Period</option>
                            <option value="Event">Company Event</option>
                            <option value="Meeting">Meeting</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Start
                            Date</label>
                        <input type="date" required id="evt-start"
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">End Date
                            (Optional)</label>
                        <input type="date" id="evt-end"
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-primary">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Description</label>
                    <textarea id="evt-desc" rows="3"
                        class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-primary"
                        placeholder="Details..."></textarea>
                </div>

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="closeEventModal()"
                        class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
                    <button type="submit" id="submit-btn"
                        class="px-4 py-2 rounded-lg bg-primary text-white flex items-center gap-2 hover:bg-blue-600 transition-colors">
                        Add Event
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script type="module">
        import { db, collection, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy, onSnapshot, auth } from '../assets/js/firebase-config.js';
        import { initAuthObserver, logActivity } from '../assets/js/firebase-modules.js';
        import { initRBACGuard, PERMISSIONS } from '../assets/js/rbac.js';

        // Initialize RBAC with view permission
        // initRBACGuard([PERMISSIONS.VIEW_CALENDAR]); // Assuming this exists or generic view
        initAuthObserver(true);

        // State
        let currentDate = new Date();
        let selectedDate = new Date();
        let events = [];
        let unsubscribe = null;

        // Firebase Realtime Listener
        function subscribeToEvents() {
            const q = query(collection(db, 'calendar_events'), orderBy('start', 'asc'));

            unsubscribe = onSnapshot(q, (snapshot) => {
                events = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                renderCalendar();
                renderEventList();
            }, (error) => {
                console.error("Error fetching events:", error);
                showToast("Failed to sync calendar", "error");
            });
        }

        // Calendar Logic
        const monthNames = ["January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        window.renderCalendar = function () {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('calendar-month-year').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);

            const daysContainer = document.getElementById('calendar-days');
            daysContainer.innerHTML = '';

            // Empty slots for previous month
            for (let i = 0; i < firstDay.getDay(); i++) {
                const div = document.createElement('div');
                daysContainer.appendChild(div);
            }

            // Days
            for (let i = 1; i <= lastDay.getDate(); i++) {
                const dayDate = new Date(year, month, i);
                const dateStr = formatDate(dayDate);

                // Find events happening on this day
                const dayEvents = events.filter(e => isDateInEvent(dateStr, e));
                const isSelected = selectedDate && formatDate(selectedDate) === dateStr;
                const isToday = formatDate(new Date()) === dateStr;

                const dayEl = document.createElement('div');
                dayEl.classList.add('calendar-day');
                dayEl.textContent = i;

                // Priority Check for Periods (Shutdown > Holiday > Event)
                const periodEvent = dayEvents.find(e => e.start !== e.end && e.end); // Multi-day
                if (periodEvent) {
                    dayEl.classList.add('in-period');
                    if (periodEvent.type === 'Shutdown') dayEl.classList.add('period-shutdown');
                    else if (periodEvent.type === 'Holiday') dayEl.classList.add('period-holiday');
                    else dayEl.classList.add('period-event');

                    if (periodEvent.start === dateStr) dayEl.classList.add('period-start');
                    if (periodEvent.end === dateStr) dayEl.classList.add('period-end');
                }

                // Dot indicators for distinct events (max 3)
                if (dayEvents.length > 0) {
                    // Only show dots if not a period background or if distinct single day evt
                    const singleDayEvents = dayEvents.filter(e => !e.end || e.start === e.end);
                    if (singleDayEvents.length > 0 && !periodEvent) {
                        const dotColor = getEventColor(singleDayEvents[0].type);
                        const dot = document.createElement('div');
                        dot.className = 'event-dot';
                        dot.style.backgroundColor = dotColor;
                        dayEl.appendChild(dot);
                    }
                }

                if (isSelected) dayEl.classList.add('active');
                if (isToday) dayEl.classList.add('today');

                dayEl.onclick = () => {
                    selectedDate = dayDate;
                    renderCalendar();
                    scrollToEvent(dateStr);
                };

                daysContainer.appendChild(dayEl);
            }
        }

        window.prevMonth = function () {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        window.nextMonth = function () {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function formatDate(d) {
            const offset = d.getTimezoneOffset();
            d = new Date(d.getTime() - (offset * 60 * 1000));
            return d.toISOString().split('T')[0];
        }

        function isDateInEvent(dateStr, event) {
            if (event.end && event.end !== event.start) {
                return dateStr >= event.start && dateStr <= event.end;
            }
            return dateStr === event.start;
        }

        function getEventColor(type) {
            switch (type) {
                case 'Holiday': return '#ef4444';
                case 'Shutdown': return '#f59e0b';
                case 'Meeting': return '#10b981';
                default: return '#3b82f6';
            }
        }

        // Event List Logic
        function renderEventList() {
            const container = document.getElementById('event-list-container');
            const search = document.getElementById('event-search').value.toLowerCase();
            const filter = document.getElementById('filter-type').value;

            container.innerHTML = '';

            // Filter
            let filteredEvents = events.filter(evt => {
                if (filter !== 'all' && evt.type !== filter) return false;
                if (search && !evt.title.toLowerCase().includes(search) && !(evt.description || '').toLowerCase().includes(search)) return false;
                return true;
            });

            if (filteredEvents.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-500 opacity-60">No events found matching your criteria.</div>`;
                return;
            }

            // Sort by Date
            filteredEvents.sort((a, b) => a.start.localeCompare(b.start));

            const typeColors = {
                'Holiday': 'bg-red-500',
                'Shutdown': 'bg-amber-500',
                'Event': 'bg-blue-500',
                'Meeting': 'bg-emerald-500'
            };

            filteredEvents.forEach(evt => {
                const card = document.createElement('div');
                card.id = `evt-${evt.id}`; // Changed to ID for reliability
                card.className = `p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all cursor-pointer group animate-fade-in-up`;

                // Highlight logic
                if (selectedDate && isDateInEvent(formatDate(selectedDate), evt)) {
                    card.classList.add('ring-2', 'ring-primary', 'bg-indigo-50', 'dark:bg-indigo-900/20');
                }

                card.innerHTML = `
                    <div class="flex items-start gap-4">
                        <div class="flex flex-col items-center min-w-[3.5rem] px-2 py-1 rounded-lg bg-slate-100 dark:bg-slate-700">
                            <span class="text-xs font-bold text-slate-500 uppercase">${new Date(evt.start).toLocaleString('default', { month: 'short' })}</span>
                            <span class="text-xl font-bold text-slate-900 dark:text-white">${new Date(evt.start).getDate()}</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1 flex-wrap">
                                <span class="w-2 h-2 rounded-full ${typeColors[evt.type] || 'bg-slate-400'}"></span>
                                <span class="text-xs font-bold uppercase tracking-wider text-slate-500">${evt.type}</span>
                                ${evt.end && evt.end !== evt.start ? `<span class="text-xs text-slate-400 whitespace-nowrap">- ${new Date(evt.end).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-slate-900 dark:text-white text-lg truncate">${evt.title}</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 line-clamp-2">${evt.description || ''}</p>
                        </div>
                        <!-- Admin Actions -->
                        <div class="opacity-0 group-hover:opacity-100 transition-opacity flex flex-col gap-1">
                             <button onclick="deleteEvent('${evt.id}', event)" class="p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-slate-400 hover:text-red-500 transition-colors" title="Delete">
                                <span class="material-symbols-outlined text-lg">delete</span>
                             </button>
                        </div>
                    </div>
                `;

                card.onclick = (e) => {
                    // Prevent trigger if delete button clicked (handled by stopPropagation in deleteEvent but safer here)
                    if (e.target.closest('button')) return;

                    selectedDate = new Date(evt.start);
                    currentDate = new Date(evt.start);
                    renderCalendar();
                    renderEventList();
                }

                container.appendChild(card);
            });
        }

        function scrollToEvent(dateStr) {
            // Find first event on/after date
            const targetEvent = events.find(e => isDateInEvent(dateStr, e));
            if (targetEvent) {
                // Ensure rendering is up to date (highlights)
                renderEventList();
                setTimeout(() => {
                    const el = document.getElementById(`evt-${targetEvent.id}`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('ring-4', 'ring-primary/30');
                        setTimeout(() => el.classList.remove('ring-4', 'ring-primary/30'), 1000);
                    }
                }, 100);
            }
        }

        // Add Event Modal
        window.openEventModal = function () {
            document.getElementById('event-modal').classList.remove('hidden');
            document.getElementById('event-form').reset();
            if (selectedDate) {
                document.getElementById('evt-start').value = formatDate(selectedDate);
            }
        }

        window.closeEventModal = function () {
            document.getElementById('event-modal').classList.add('hidden');
        }

        document.getElementById('event-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<span class="material-symbols-outlined text-sm animate-spin">progress_activity</span> Adding...';
            btn.disabled = true;

            try {
                const title = document.getElementById('evt-title').value;
                const type = document.getElementById('evt-type').value;
                const start = document.getElementById('evt-start').value;
                const end = document.getElementById('evt-end').value || null;
                const description = document.getElementById('evt-desc').value;

                // Validation: End date must be >= Start date if present
                if (end && end < start) {
                    throw new Error("End date cannot be before start date");
                }

                await addDoc(collection(db, 'calendar_events'), {
                    title,
                    type,
                    start,
                    end,
                    description,
                    createdAt: serverTimestamp(),
                    createdBy: auth.currentUser?.uid || 'system'
                });

                await logActivity('CREATE', 'CALENDAR', `Created event: ${title} (${start})`);

                showToast("Event added successfully!", "success");
                closeEventModal();
            } catch (error) {
                console.error("Error adding event:", error);
                showToast(error.message, "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Delete Event
        window.deleteEvent = async function (id, event) {
            if (event) event.stopPropagation();

            if (!confirm("Are you sure you want to delete this event?")) return;

            try {
                await deleteDoc(doc(db, 'calendar_events', id));
                await logActivity('DELETE', 'CALENDAR', `Deleted event: ${id}`);
                showToast("Event deleted", "success");
            } catch (e) {
                console.error(e);
                showToast("Failed to delete event", "error");
            }
        }

        // Search listeners
        document.getElementById('event-search').addEventListener('input', renderEventList);
        document.getElementById('filter-type').addEventListener('change', renderEventList);

        function showToast(msg, type) {
            const t = document.createElement('div');
            t.className = `fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50 ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'} text-white animate-fade-in-up`;
            t.innerHTML = `<span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'error'}</span><span>${msg}</span>`;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        // Init
        subscribeToEvents();
