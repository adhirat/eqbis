<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Websites - Eqbis Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
    <!-- Global Assets -->
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
</head>

<body
    class="pt-0 font-display bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-white antialiased overflow-hidden h-screen flex">

    <!-- Global Sidebar -->
    <div id="portal-sidebar" class="contents"></div>

    <!-- Main Wrapper -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Global Header -->
        <div id="portal-header" class="contents"></div>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 animate-fade-in-up">
            <div class="max-w-[1600px] mx-auto w-full space-y-8">

                <!-- Header Section -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1
                            class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-neon-violet to-neon-cyan">
                            My Websites</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-1">Manage and edit your web projects</p>
                    </div>
                    <a href="composer.html"
                        class="flex items-center gap-2 bg-neon-violet hover:bg-neon-violet/90 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-neon-violet/25 transition-all hover:scale-105 active:scale-95">
                        <span class="material-symbols-outlined">add</span>
                        <span class="font-bold">Create New</span>
                    </a>
                </div>

                <!-- Websites Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

                    <!-- Website Card 1 -->
                    <a href="composer.html"
                        class="group block bg-white dark:bg-dark-card rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 hover:shadow-xl dark:hover:shadow-neon-violet/10 transition-all duration-300">
                        <div class="aspect-video relative overflow-hidden bg-slate-100 dark:bg-slate-800">
                            <!-- Preview Image Placeholder -->
                            <div
                                class="absolute inset-0 flex items-center justify-center text-slate-300 dark:text-slate-600">
                                <span
                                    class="material-symbols-outlined text-6xl opacity-20 group-hover:scale-110 transition-transform duration-500">web</span>
                            </div>
                            <div
                                class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                                <span class="text-white text-sm font-bold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-base">edit</span> Edit in Composer
                                </span>
                            </div>
                        </div>
                        <div class="p-5">
                            <h3
                                class="font-bold text-lg text-slate-900 dark:text-white mb-1 group-hover:text-neon-violet transition-colors">
                                Personal Portfolio</h3>
                            <div class="flex justify-between items-center text-xs text-slate-500 dark:text-slate-400">
                                <span>Updated 2 hours ago</span>
                                <span class="flex items-center gap-1 text-emerald-500"><span
                                        class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Live</span>
                            </div>
                        </div>
                    </a>

                    <!-- Website Card 2 -->
                    <a href="composer.html"
                        class="group block bg-white dark:bg-dark-card rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 hover:shadow-xl dark:hover:shadow-neon-violet/10 transition-all duration-300">
                        <div class="aspect-video relative overflow-hidden bg-slate-100 dark:bg-slate-800">
                            <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-purple-500/10"></div>
                            <div
                                class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                                <span class="text-white text-sm font-bold flex items-center gap-1">
                                    <span class="material-symbols-outlined text-base">edit</span> Edit in Composer
                                </span>
                            </div>
                        </div>
                        <div class="p-5">
                            <h3
                                class="font-bold text-lg text-slate-900 dark:text-white mb-1 group-hover:text-neon-violet transition-colors">
                                E-commerce Store</h3>
                            <div class="flex justify-between items-center text-xs text-slate-500 dark:text-slate-400">
                                <span>Updated yesterday</span>
                                <span class="flex items-center gap-1 text-orange-500"><span
                                        class="w-1.5 h-1.5 rounded-full bg-orange-500"></span> Draft</span>
                            </div>
                        </div>
                    </a>

                    <!-- New Project Placeholder -->
                    <a href="composer.html"
                        class="group relative bg-slate-50 dark:bg-slate-800/50 rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-700 hover:border-neon-violet dark:hover:border-neon-violet transition-all duration-300 flex flex-col items-center justify-center aspect-[4/3] hover:bg-slate-100 dark:hover:bg-slate-800">
                        <div
                            class="size-16 rounded-full bg-white dark:bg-slate-800 shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300">
                            <span class="material-symbols-outlined text-3xl text-neon-violet">add</span>
                        </div>
                        <span class="font-bold text-slate-900 dark:text-white">Start New Project</span>
                    </a>

                </div>

            </div>
        </div>
    </main>

</body>

</html>
