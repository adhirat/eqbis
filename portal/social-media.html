<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Social Media - Eqbis Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
    <!-- Global Assets -->
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
</head>

<body
    class="pt-0 font-display bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-white antialiased overflow-hidden h-screen flex">

    <!-- Global Sidebar -->
    <div id="portal-sidebar" class="contents"></div>

    <!-- Main Wrapper -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Global Header -->
        <div id="portal-header" class="contents"></div>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 animate-fade-in-up">
            <div class="max-w-[1600px] mx-auto w-full space-y-8">

                <!-- Header Section -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h1
                            class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-neon-violet to-neon-cyan">
                            Social Media</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-1">Manage social media accounts and posts</p>
                    </div>
                    <button disabled
                        class="flex items-center gap-2 bg-neon-violet/50 cursor-not-allowed text-white px-5 py-2.5 rounded-xl shadow-lg shadow-neon-violet/25 transition-all">
                        <span class="material-symbols-outlined">add</span>
                        <span class="font-bold">Connect Account</span>
                    </button>
                </div>

                <!-- Empty State -->
                <div class="flex flex-col items-center justify-center py-20 text-center">
                    <div
                        class="w-24 h-24 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-6">
                        <span class="material-symbols-outlined text-5xl text-slate-400">share</span>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Social Media Manager coming soon
                    </h2>
                    <p class="text-slate-500 dark:text-slate-400 max-w-md">Schedule posts, analyze performance, and
                        engage with your audience from one platform.</p>
                </div>

            </div>
        </div>
    </main>

</body>

</html>
