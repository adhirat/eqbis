<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Receipts Management - Adhirat Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
    <style>
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .receipt-paper {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body
    class="pt-0 bg-background-light dark:bg-dark-bg text-slate-900 dark:text-white font-display antialiased overflow-hidden">
    <div class="flex h-screen w-full overflow-hidden">
        <div id="portal-sidebar" class="contents"></div>
        <main class="flex-1 flex flex-col min-w-0">
            <div id="portal-header" class="contents"></div>
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 animate-fade-in-up">
                <div class="max-w-[1280px] mx-auto flex flex-col gap-8">
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-center">
                            <div>
                                <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Receipts
                                    Management
                                </h1>
                                <p class="text-slate-500 dark:text-slate-400">Create and manage payment receipts for
                                    clients.</p>
                            </div>
                            <button onclick="openModal()" id="add-btn"
                                class="px-4 py-2 rounded-lg bg-primary text-white font-semibold flex items-center gap-2 hover:bg-blue-600 transition-colors shadow-lg shadow-primary/25 whitespace-nowrap">
                                <span class="material-symbols-outlined text-lg">add</span>
                                Create Receipt
                            </button>
                        </div>
                    </div>

                    <div
                        class="bg-white dark:bg-dark-card rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">

                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm text-slate-500 dark:text-slate-400">
                                <thead
                                    class="bg-slate-50 dark:bg-[#1a202c] text-xs uppercase font-semibold text-slate-500 dark:text-slate-400">
                                    <tr>
                                        <th class="px-6 py-3">Receipt #</th>
                                        <th class="px-6 py-3">Client</th>
                                        <th class="px-6 py-3">Invoice #</th>
                                        <th class="px-6 py-3">Date</th>
                                        <th class="px-6 py-3 text-right">Amount</th>
                                        <th class="px-6 py-3 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body" class="divide-y divide-slate-200 dark:divide-border-dark">
                                    <tr>
                                        <td colspan="6" class="px-6 py-12 text-center">
                                            <span
                                                class="material-symbols-outlined text-4xl text-slate-400 animate-spin mb-2">progress_activity</span>
                                            <p>Loading receipts...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Receipt Modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
        <div
            class="relative bg-white dark:bg-dark-card rounded-2xl shadow-2xl w-full max-w-6xl h-[90vh] flex flex-col border border-slate-200 dark:border-slate-700 animate-fade-in-up">
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Create Receipt</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><span
                        class="material-symbols-outlined">close</span></button>
            </div>

            <div class="flex-1 flex overflow-hidden">
                <!-- Form -->
                <div class="w-1/3 p-6 overflow-y-auto border-r border-slate-200 dark:border-slate-700 space-y-4">
                    <input type="hidden" id="receipt-id">

                    <label class="block">
                        <span class="text-sm font-medium text-slate-700 dark:text-slate-200">Select Client *</span>
                        <select id="client-select"
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 mt-1"
                            onchange="loadInvoices()">
                            <option value="">-- Select Client --</option>
                        </select>
                    </label>

                    <label class="block">
                        <span class="text-sm font-medium text-slate-700 dark:text-slate-200">Select Invoice *</span>
                        <select id="invoice-select"
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 mt-1"
                            onchange="updatePreview()">
                            <option value="">-- Select Invoice --</option>
                        </select>
                    </label>

                    <div class="grid grid-cols-2 gap-4">
                        <label class="block">
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-200">Payment Date *</span>
                            <input type="date" id="payment-date"
                                class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 mt-1"
                                onchange="updatePreview()">
                        </label>
                        <label class="block">
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-200">Payment Method</span>
                            <select id="payment-method"
                                class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 mt-1"
                                onchange="updatePreview()">
                                <option value="Bank Transfer">Bank Transfer</option>
                                <option value="Credit Card">Credit Card</option>
                                <option value="Cash">Cash</option>
                                <option value="Cheque">Cheque</option>
                                <option value="UPI">UPI</option>
                            </select>
                        </label>
                    </div>

                    <label class="block">
                        <span class="text-sm font-medium text-slate-700 dark:text-slate-200">Amount Received *</span>
                        <div class="relative mt-1">
                            <span class="absolute left-3 top-2 text-slate-500">$</span>
                            <input type="number" id="payment-amount"
                                class="w-full pl-8 rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900"
                                oninput="updatePreview()">
                        </div>
                    </label>

                    <label class="block">
                        <span class="text-sm font-medium text-slate-700 dark:text-slate-200">Reference / Note</span>
                        <textarea id="payment-note" rows="3"
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 mt-1"
                            oninput="updatePreview()"></textarea>
                    </label>

                </div>

                <!-- Preview -->
                <div class="w-2/3 bg-slate-50 dark:bg-slate-900 p-8 overflow-y-auto flex items-start justify-center">
                    <div id="preview-container" class="receipt-paper text-slate-900 relative">
                        <!-- Content injected via JS -->
                    </div>
                </div>
            </div>

            <div
                class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 flex justify-end gap-3 bg-slate-50 dark:bg-slate-800/50">
                <button onclick="closeModal()"
                    class="px-4 py-2 border rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-white">Cancel</button>
                <button onclick="saveReceipt()" id="save-btn"
                    class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 font-semibold shadow-lg flex items-center gap-2">
                    <span class="material-symbols-outlined animate-spin hidden" id="save-spinner">sync</span>
                    Save Receipt
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script type="module">
        import { db, collection, getDocs, doc, setDoc, deleteDoc, updateDoc, serverTimestamp, query, orderBy, where } from '../assets/js/firebase-config.js';
        import { getOrganizationProfile, initAuthObserver } from '../assets/js/firebase-modules.js';

        initAuthObserver(true);

        let clients = [];
        let receipts = [];
        let orgProfile = {};

        // Initialize
        (async function () {
            orgProfile = await getOrganizationProfile() || {};
            await loadClients();
            await loadReceipts();
        })();

        async function loadClients() {
            try {
                const q = query(collection(db, 'clients'), orderBy('name'));
                const snap = await getDocs(q);
                clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const sel = document.getElementById('client-select');
                sel.innerHTML = '<option value="">-- Select Client --</option>' +
                    clients.map(c => `<option value="${c.id}">${c.name} (${c.company || 'N/A'})</option>`).join('');
            } catch (e) {
                console.error(e);
            }
        }

        window.loadInvoices = async function () {
            const clientId = document.getElementById('client-select').value;
            const invoiceSel = document.getElementById('invoice-select');
            invoiceSel.innerHTML = '<option value="">Loading...</option>';

            if (!clientId) {
                invoiceSel.innerHTML = '<option value="">-- Select Invoice --</option>';
                return;
            }

            try {
                // Ideally filter by client ID if stored in invoice. As per previous schema, invoice might not link directly by ID, but we can try filtering locally or by querying
                const q = query(collection(db, 'invoices'), where('clientId', '==', clientId));
                // Fallback to all invoices if clientId field missing in invoice schema? Assuming it exists.
                const snap = await getDocs(q);
                const invoices = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                invoiceSel.innerHTML = '<option value="">-- Select Invoice --</option>' +
                    invoices.map(i => `<option value="${i.id}" data-amount="${i.total || 0}" data-number="${i.number}">#${i.number} - $${i.total}</option>`).join('');
            } catch (e) {
                console.error(e);
                invoiceSel.innerHTML = '<option value="">Error loading invoices</option>';
            }
        }

        async function loadReceipts() {
            try {
                const q = query(collection(db, 'receipts'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                receipts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderReceipts();
            } catch (e) {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Error loading receipts</td></tr>`;
            }
        }

        function renderReceipts() {
            const tbody = document.getElementById('table-body');
            if (receipts.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-500">No receipts found</td></tr>`;
                return;
            }

            tbody.innerHTML = receipts.map(r => {
                const client = clients.find(c => c.id === r.clientId);
                return `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                    <td class="px-6 py-4 font-mono font-medium text-slate-900 dark:text-white">${r.receiptNumber}</td>
                    <td class="px-6 py-4 text-slate-900 dark:text-white">
                        <div class="font-medium">${client?.name || 'Unknown'}</div>
                        <div class="text-xs text-slate-500">${client?.company || ''}</div>
                    </td>
                    <td class="px-6 py-4 text-slate-500">#${r.invoiceNumber || '-'}</td>
                    <td class="px-6 py-4">${r.paymentDate}</td>
                    <td class="px-6 py-4 text-right font-mono font-bold text-emerald-600">$${Number(r.amount).toFixed(2)}</td>
                    <td class="px-6 py-4 text-right">
                         <button onclick="viewReceipt('${r.id}')" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-primary"><span class="material-symbols-outlined">visibility</span></button>
                        <button onclick="deleteReceipt('${r.id}')" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-red-500"><span class="material-symbols-outlined">delete</span></button>
                    </td>
                </tr>`;
            }).join('');
        }

        window.updatePreview = function () {
            const clientId = document.getElementById('client-select').value;
            const client = clients.find(c => c.id === clientId) || {};

            const invoiceSel = document.getElementById('invoice-select');
            const invoiceOpt = invoiceSel.options[invoiceSel.selectedIndex];
            const invoiceNumber = invoiceOpt?.dataset?.number || '---';

            const date = document.getElementById('payment-date').value || new Date().toISOString().split('T')[0];
            const amount = document.getElementById('payment-amount').value || '0.00';
            const method = document.getElementById('payment-method').value;
            const note = document.getElementById('payment-note').value;

            const html = `
                <div class="flex justify-between items-start mb-12">
                    <div>
                        ${orgProfile.logoURL ? `<img src="${orgProfile.logoURL}" class="h-16 w-auto mb-4" alt="Logo">` : '<h1 class="text-3xl font-bold text-primary mb-2">ADHIRAT</h1>'}
                        <p class="text-sm font-bold text-slate-700">${orgProfile.companyName || 'Adhirat Technologies'}</p>
                        <p class="text-sm text-slate-500 max-w-xs">${orgProfile.address || 'Address Line 1<br>City, State, Zip'}</p>
                        <p class="text-sm text-slate-500 mt-1">${orgProfile.email || 'contact@adhirat.com'}</p>
                    </div>
                    <div class="text-right">
                        <h2 class="text-4xl font-bold text-slate-200 uppercase tracking-widest mb-2">Receipt</h2>
                        <p class="text-sm text-slate-500">Receipt #: <span class="font-mono font-bold text-slate-900">PREVIEW</span></p>
                        <p class="text-sm text-slate-500">Date: <span class="font-mono font-bold text-slate-900">${date}</span></p>
                    </div>
                </div>

                <div class="border-t-2 border-slate-100 py-8 mb-8">
                    <div class="grid grid-cols-2 gap-8">
                        <div>
                            <p class="text-xs uppercase tracking-wider text-slate-400 font-bold mb-2">Received From</p>
                            <p class="font-bold text-lg text-slate-900">${client.company || client.name || 'Client Name'}</p>
                            <p class="text-slate-500 text-sm whitespace-pre-wrap">${client.address || ''}</p>
                        </div>
                        <div class="text-right">
                             <p class="text-xs uppercase tracking-wider text-slate-400 font-bold mb-2">Payment Details</p>
                             <div class="inline-block text-left">
                                <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm">
                                    <span class="text-slate-500">Payment Method:</span>
                                    <span class="font-medium text-slate-900">${method}</span>
                                    <span class="text-slate-500">Invoice Ref:</span>
                                    <span class="font-medium text-slate-900">#${invoiceNumber}</span>
                                </div>
                             </div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-xl p-8 mb-8">
                    <div class="flex justify-between items-center">
                        <span class="text-lg font-medium text-slate-700">Amount Received</span>
                        <span class="text-3xl font-bold text-slate-900">$${Number(amount).toFixed(2)}</span>
                    </div>
                </div>

                ${note ? `
                <div class="mb-12">
                    <p class="text-xs uppercase tracking-wider text-slate-400 font-bold mb-2">Note / Reference</p>
                    <p class="text-sm text-slate-600 bg-yellow-50 p-4 rounded-lg border border-yellow-100">${note}</p>
                </div>
                ` : ''}

                <div class="mt-auto pt-12 text-center text-slate-400 text-sm">
                    <p>Thank you for your business!</p>
                </div>
            `;

            document.getElementById('preview-container').innerHTML = html;
        }

        window.saveReceipt = async function () {
            const btn = document.getElementById('save-btn');
            const spinner = document.getElementById('save-spinner');

            const clientId = document.getElementById('client-select').value;
            const invoiceId = document.getElementById('invoice-select').value;
            const invoiceSel = document.getElementById('invoice-select');
            const invoiceOpt = invoiceSel.options[invoiceSel.selectedIndex];
            const invoiceNumber = invoiceOpt?.dataset?.number || '';

            if (!clientId || !invoiceId) {
                showToast('Please select client and invoice', 'error');
                return;
            }

            btn.disabled = true;
            spinner.classList.remove('hidden');

            try {
                const data = {
                    clientId,
                    invoiceId,
                    invoiceNumber,
                    paymentDate: document.getElementById('payment-date').value,
                    paymentMethod: document.getElementById('payment-method').value,
                    amount: Number(document.getElementById('payment-amount').value),
                    note: document.getElementById('payment-note').value,
                    receiptNumber: 'REC-' + Date.now().toString().slice(-6),
                    createdAt: serverTimestamp()
                };

                await setDoc(doc(collection(db, 'receipts')), data);
                showToast('Receipt created successfully', 'success');
                closeModal();
                loadReceipts();
            } catch (e) {
                console.error(e);
                showToast(e.message, 'error');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }

        window.openModal = function () {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('payment-date').valueAsDate = new Date();
            updatePreview();
        }
        window.closeModal = function () {
            document.getElementById('modal').classList.add('hidden');
        }

        window.deleteReceipt = async function (id) {
            if (confirm('Delete this receipt?')) {
                await deleteDoc(doc(db, 'receipts', id));
                loadReceipts();
            }
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-lg shadow-lg text-white ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'} animate-fade-in-up`;
            toast.innerText = message;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>

</html>
