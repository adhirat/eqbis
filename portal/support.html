<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Support Tickets - Eqbis Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind Configuration -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b5cf6",
                        "primary-light": "#a78bfa",
                        "primary-dark": "#7c3aed",
                        "background-light": "#f8fafc",
                        "dark-bg": "#0f0f23",
                        "dark-card": "#1a1a3e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                    },
                }
            }
        }
    </script>
    <!-- Styles -->
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
    <style>
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>

<body
    class="pt-0 bg-background-light dark:bg-dark-bg text-slate-900 dark:text-white font-display antialiased overflow-hidden">
    <div class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar Navigation -->
        <div id="portal-sidebar" class="contents"></div>

        <!-- Main Content Wrapper -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- Top Header -->
            <div id="portal-header" class="contents"></div>

            <!-- Dashboard Content Scrollable Area -->
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 animate-fade-in-up">
                <div class="max-w-[1280px] mx-auto flex flex-col gap-8">
                    <!-- Page Heading -->
                    <div class="flex flex-col gap-1">
                        <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Support Tickets
                        </h1>
                        <p class="text-slate-500 dark:text-slate-400">Create and manage support requests.</p>
                    </div>

                    <!-- Actions + Filter -->
                    <div
                        class="bg-white dark:bg-dark-card rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-3 w-full sm:w-auto">
                            <div class="relative w-full sm:w-64">
                                <input type="text" id="search-tickets" placeholder="Search tickets..."
                                    class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm focus:ring-2 focus:ring-primary focus:border-transparent">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
                            </div>
                            <select id="status-filter"
                                class="pl-3 pr-8 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm">
                                <option value="all">All Status</option>
                                <option value="open">Open</option>
                                <option value="in_progress">In Progress</option>
                                <option value="on_hold">On Hold</option>
                                <option value="pending">Pending</option>
                                <option value="closed">Closed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                        <button onclick="openCreateTicketModal()"
                            class="w-full sm:w-auto px-4 py-2 rounded-lg bg-primary text-white font-semibold flex items-center justify-center gap-2 hover:bg-primary-dark transition-colors shadow-lg shadow-primary/25">
                            <span class="material-symbols-outlined text-lg">add</span>
                            Create Ticket
                        </button>
                    </div>

                    <!-- Tickets List -->
                    <div class="space-y-4" id="tickets-container">
                        <!-- Loading State -->
                        <div class="text-center py-12">
                            <span
                                class="material-symbols-outlined text-4xl text-slate-400 animate-spin mb-2">progress_activity</span>
                            <p class="text-slate-500">Loading tickets...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Ticket Modal -->
    <div id="create-ticket-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-backdrop absolute inset-0" onclick="closeCreateTicketModal()"></div>
        <div
            class="relative bg-white dark:bg-dark-card rounded-2xl shadow-2xl max-w-2xl w-full border border-slate-200 dark:border-slate-700 animate-fade-in-up max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Create New Ticket</h2>
                <button onclick="closeCreateTicketModal()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="create-ticket-form" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-200">Title *</label>
                        <input type="text" id="ticket-title" required
                            class="w-full px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-primary">
                    </div>
                    <!-- Admin Assignment Section -->
                    <div class="space-y-1 hidden" id="admin-assignee-container">
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-200">Assign To (Admin)</label>
                        <select id="ticket-assignee"
                            class="w-full px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-primary">
                            <option value="">Unassigned</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 dark:text-slate-200">Description *</label>
                    <textarea id="ticket-description" rows="4" required
                        class="w-full px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-primary"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 dark:text-slate-200">Attachments</label>
                    <input type="file" id="ticket-attachments" multiple
                        class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20">
                </div>

                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeCreateTicketModal()"
                        class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700">Cancel</button>
                    <button type="submit"
                        class="px-6 py-2 rounded-lg bg-primary text-white font-semibold shadow-lg shadow-primary/25 hover:bg-primary-dark transition-colors">Create
                        Ticket</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Ticket Detail Modal -->
    <div id="ticket-detail-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-backdrop absolute inset-0" onclick="closeDetailModal()"></div>
        <div
            class="relative bg-white dark:bg-dark-card rounded-2xl shadow-2xl max-w-4xl w-full border border-slate-200 dark:border-slate-700 animate-fade-in-up h-[85vh] flex flex-col">
            <!-- Header -->
            <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-start">
                <div class="flex-1 pr-4">
                    <div class="flex items-center gap-3 mb-2">
                        <span id="detail-id"
                            class="text-xs font-mono bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded text-slate-500"></span>
                        <span id="detail-status"
                            class="px-2 py-0.5 rounded-full text-xs font-bold uppercase tracking-wider"></span>
                    </div>
                    <h2 id="detail-title" class="text-2xl font-bold text-slate-900 dark:text-white"></h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-delete-ticket"
                        class="hidden p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors"
                        title="Delete Ticket">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                    <button onclick="closeDetailModal()"
                        class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-hidden flex flex-col md:flex-row">
                <!-- Left: Details -->
                <div class="w-full md:w-2/3 p-6 overflow-y-auto border-r border-slate-200 dark:border-slate-700">
                    <div class="mb-6">
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">Description</h3>
                        <p id="detail-description"
                            class="text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed"></p>
                    </div>

                    <div id="detail-attachments-section" class="mb-6">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest">Attachments</h3>
                            <button onclick="document.getElementById('add-attachment-input').click()"
                                class="text-xs text-primary hover:text-primary-dark font-medium flex items-center gap-1">
                                <span class="material-symbols-outlined text-[16px]">add</span> Add
                            </button>
                            <input type="file" id="add-attachment-input" multiple class="hidden">
                        </div>
                        <div id="detail-attachments-list" class="flex flex-wrap gap-2 text-sm text-slate-500">No
                            attachments</div>
                    </div>

                    <!-- Work Logs / Comments -->
                    <div>
                        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4">Work Logs</h3>
                        <div id="work-logs-container" class="space-y-4 mb-4">
                            <!-- Logs injected here -->
                        </div>

                        <form id="add-log-form" class="flex gap-2 items-start mt-4">
                            <textarea id="new-log-content" rows="2" placeholder="Add a comment or update..."
                                class="flex-1 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm focus:ring-primary resize-none"></textarea>
                            <button type="submit" class="p-2 bg-primary text-white rounded-lg hover:bg-primary-dark">
                                <span class="material-symbols-outlined">send</span>
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Right: Meta -->
                <div class="w-full md:w-1/3 bg-slate-50 dark:bg-slate-800/50 p-6 overflow-y-auto space-y-6">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase">Reporter</label>
                        <div class="flex items-center gap-2 mt-1">
                            <div id="detail-reporter-avatar"
                                class="size-6 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold">
                            </div>
                            <span id="detail-reporter-name" class="text-sm font-medium"></span>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase">Assignee</label>
                        <!-- Admin Select -->
                        <div id="detail-assignee-edit" class="hidden mt-1">
                            <select id="detail-assignee-select"
                                class="w-full text-sm rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800"></select>
                        </div>
                        <!-- View Only -->
                        <div id="detail-assignee-view" class="flex items-center gap-2 mt-1">
                            <div id="detail-assignee-avatar"
                                class="size-6 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold">
                                ?</div>
                            <span id="detail-assignee-name" class="text-sm font-medium mb-1">Unassigned</span>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase">Status</label>
                        <select id="detail-status-select"
                            class="w-full mt-1 text-sm rounded border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-2">
                            <option value="open">Open</option>
                            <option value="in_progress">In Progress</option>
                            <option value="on_hold">On Hold</option>
                            <option value="pending">Pending</option>
                            <option value="closed">Closed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>

                    <div class="text-xs text-slate-500 space-y-2 pt-4 border-t border-slate-200 dark:border-slate-700">
                        <p>Created: <span id="detail-created-at"></span></p>
                        <p>Updated: <span id="detail-updated-at"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { db, auth, storage, collection, addDoc, getDoc, getDocs, updateDoc, deleteDoc, doc, query, where, orderBy, onAuthStateChanged, serverTimestamp, ref, uploadBytes, getDownloadURL, deleteObject } from '../assets/js/firebase-config.js';
        import { initAuthObserver } from '../assets/js/firebase-modules.js';

        let currentUser = null;
        let allUsers = [];
        let tickets = [];
        let currentTicketId = null;

        const statusColors = {
            open: 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300',
            in_progress: 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-300',
            on_hold: 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-300',
            pending: 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300',
            closed: 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300',
            cancelled: 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-400',
        };

        const statusLabels = {
            open: 'Open', in_progress: 'In Progress', on_hold: 'On Hold', pending: 'Pending', closed: 'Closed', cancelled: 'Cancelled'
        };

        // Initialize
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Fetch User Role
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                const userData = userDoc.exists() ? userDoc.data() : {};
                currentUser.role = userData.role || 'guest';
                currentUser.roles = userData.roles || [currentUser.role];

                // Allow Admins and HR to fetch users for assignment
                if (hasPermission('assign_tickets')) {
                    await fetchUsers();
                }

                loadTickets();
                initListeners();
            } else {
                window.location.href = 'login.html';
            }
        });

        function hasPermission(perm) {
            const allowedRoles = ['admin', 'hr', 'manager']; // Simplified RBAC
            return currentUser.roles.some(r => allowedRoles.includes(r));
        }

        async function fetchUsers() {
            try {
                const q = query(collection(db, 'users'), orderBy('fullName'));
                const snapshot = await getDocs(q);
                allUsers = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                populateAssigneeDropdowns();
            } catch (err) {
                console.error("Error fetching users", err);
            }
        }

        function populateAssigneeDropdowns() {
            const dropdowns = [document.getElementById('ticket-assignee'), document.getElementById('detail-assignee-select')];
            dropdowns.forEach(select => {
                select.innerHTML = '<option value="">Unassigned</option>';
                allUsers.forEach(u => {
                    const opt = document.createElement('option');
                    opt.value = u.id;
                    opt.textContent = `${u.fullName} (${u.email})`;
                    select.appendChild(opt);
                });
            });
            document.getElementById('admin-assignee-container').classList.remove('hidden');
            document.getElementById('detail-assignee-edit').classList.remove('hidden');
            document.getElementById('detail-assignee-view').classList.add('hidden');
        }

        async function loadTickets() {
            const container = document.getElementById('tickets-container');
            container.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-4xl text-slate-400 animate-spin mb-2">progress_activity</span><p>Loading...</p></div>';

            try {
                let q = collection(db, 'tickets');
                // If standard user, maybe only see own? Or all? User request implies "Unfiltered" search, so perhaps view all.
                // Let's assume broad visibility for internal portal, but maybe standard users only see OPEN tickets or their own.
                // For now, order by Created Date.
                q = query(q, orderBy('createdAt', 'desc'));

                const snapshot = await getDocs(q);
                tickets = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTickets(tickets);
            } catch (error) {
                console.error("Error loading tickets:", error);
                container.innerHTML = '<p class="text-red-500 text-center">Failed to load tickets.</p>';
            }
        }

        function renderTickets(data) {
            const container = document.getElementById('tickets-container');
            const searchVal = document.getElementById('search-tickets').value.toLowerCase();
            const statusVal = document.getElementById('status-filter').value;

            const filtered = data.filter(t => {
                const matchesSearch = t.title.toLowerCase().includes(searchVal) ||
                    (t.customId || '').toLowerCase().includes(searchVal) ||
                    (t.description || '').toLowerCase().includes(searchVal);
                const matchesStatus = statusVal === 'all' || t.status === statusVal;
                return matchesSearch && matchesStatus;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-12 bg-white dark:bg-dark-card rounded-xl border border-slate-200 dark:border-slate-700">
                    <span class="material-symbols-outlined text-4xl text-slate-300 mb-2">inbox</span>
                    <p class="text-slate-500">No tickets found.</p>
                </div>`;
                return;
            }

            container.innerHTML = filtered.map(ticket => {
                const statusClass = statusColors[ticket.status] || 'bg-slate-100 text-slate-600';
                const assigneeName = ticket.assigneeName || 'Unassigned';
                const createdDate = ticket.createdAt ? new Date(ticket.createdAt.toDate()).toLocaleDateString() : 'N/A';

                return `
                <div onclick="window.openTicketDetail('${ticket.id}')" class="bg-white dark:bg-dark-card p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-all cursor-pointer flex flex-col md:flex-row justify-between gap-4 group">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-mono bg-slate-100 dark:bg-slate-800 text-slate-500 px-1.5 rounded">${ticket.customId || 'TICKET'}</span>
                            <h3 class="font-bold text-slate-900 dark:text-white group-hover:text-primary transition-colors">${ticket.title}</h3>
                        </div>
                        <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-1">${ticket.description}</p>
                        <div class="flex items-center gap-4 mt-3 text-xs text-slate-400">
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">account_circle</span> ${ticket.reporterName}</span>
                            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">calendar_today</span> ${createdDate}</span>
                            ${ticket.attachmentCount ? `<span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">attach_file</span> ${ticket.attachmentCount}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center md:flex-col md:items-end md:justify-center gap-2">
                         <span class="px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusClass}">${statusLabels[ticket.status] || ticket.status}</span>
                         <div class="flex items-center gap-2 text-xs text-slate-500">
                            <span>Assignee:</span>
                            <div class="flex items-center gap-1 font-medium text-slate-700 dark:text-slate-300">
                                <span class="size-5 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-[10px]">${assigneeName[0]}</span>
                                ${assigneeName}
                            </div>
                         </div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- Create Ticket ---
        window.openCreateTicketModal = () => document.getElementById('create-ticket-modal').classList.remove('hidden');
        window.closeCreateTicketModal = () => document.getElementById('create-ticket-modal').classList.add('hidden');

        document.getElementById('create-ticket-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const title = document.getElementById('ticket-title').value;
                const description = document.getElementById('ticket-description').value;
                const assigneeId = document.getElementById('ticket-assignee').value; // Admin only usually
                const files = document.getElementById('ticket-attachments').files;

                let attachments = [];
                // Upload files
                if (files.length > 0) {
                    for (const file of files) {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `ticket_${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
                        const storageRef = ref(storage, `tickets/${fileName}`);
                        const snapshot = await uploadBytes(storageRef, file);
                        const url = await getDownloadURL(snapshot.ref);
                        attachments.push({ name: file.name, url: url, type: file.type });
                    }
                }

                // Determine Custom ID (TCK-YYYYMMDD-XXXX)
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                const randomPart = Math.floor(1000 + Math.random() * 9000);
                const customId = `TCK-${dateStr}-${randomPart}`;

                // If assignee selected, get name
                let assigneeName = null;
                if (assigneeId) {
                    const u = allUsers.find(u => u.id === assigneeId);
                    assigneeName = u ? u.fullName : null;
                }

                const docData = {
                    title,
                    description,
                    status: 'open',
                    reporterId: currentUser.uid,
                    reporterName: currentUser.displayName || currentUser.email,
                    assigneeId: assigneeId || null,
                    assigneeName: assigneeName || null,
                    assignerId: assigneeId ? currentUser.uid : null, // If someone assigned it
                    attachments,
                    attachmentCount: attachments.length,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    customId
                };

                await addDoc(collection(db, 'tickets'), docData);

                window.closeCreateTicketModal();
                e.target.reset();
                loadTickets();
                showToast('Ticket created successfully', 'success');

            } catch (error) {
                console.error("Create ticket error", error);
                alert("Failed to create ticket: " + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Ticket';
            }
        });

        // --- Detail View ---
        window.openTicketDetail = (id) => {
            currentTicketId = id;
            loadDetail(id);
            document.getElementById('ticket-detail-modal').classList.remove('hidden');
        };
        window.closeDetailModal = () => document.getElementById('ticket-detail-modal').classList.add('hidden');

        async function loadDetail(id) {
            const ticket = tickets.find(t => t.id === id);
            if (!ticket) return;

            // Basic Fields
            document.getElementById('detail-id').textContent = ticket.customId || 'ID';
            document.getElementById('detail-title').textContent = ticket.title;
            const statusEl = document.getElementById('detail-status');
            statusEl.textContent = statusLabels[ticket.status] || ticket.status;
            statusEl.className = `px-2 py-0.5 rounded-full text-xs font-bold uppercase tracking-wider ${statusColors[ticket.status]}`;

            document.getElementById('detail-description').textContent = ticket.description;
            document.getElementById('detail-reporter-name').textContent = ticket.reporterName;
            document.getElementById('detail-reporter-avatar').textContent = (ticket.reporterName || 'U')[0];

            // Assignee (Admin can edit)
            if (hasPermission('assign_tickets')) {
                document.getElementById('detail-assignee-select').value = ticket.assigneeId || "";
            } else {
                document.getElementById('detail-assignee-edit').classList.add('hidden');
                document.getElementById('detail-assignee-view').classList.remove('hidden');
                document.getElementById('detail-assignee-name').textContent = ticket.assigneeName || 'Unassigned';
            }

            document.getElementById('detail-status-select').value = ticket.status;

            // Timestamps
            const created = ticket.createdAt ? new Date(ticket.createdAt.toDate()) : new Date();
            document.getElementById('detail-created-at').textContent = created.toLocaleString();

            // Delete Logic (Admin Only)
            const deleteBtn = document.getElementById('btn-delete-ticket');
            if (hasPermission('delete_tickets')) {
                deleteBtn.classList.remove('hidden');
                deleteBtn.onclick = async () => {
                    if (confirm('Are you sure you want to delete this ticket and all attachments?')) {
                        await deleteTicket(ticket);
                    }
                };
            }

            // Attachments
            renderAttachments(ticket);

            // Load Work Logs
            loadWorkLogs(id);
        }

        async function loadWorkLogs(ticketId) {
            const logContainer = document.getElementById('work-logs-container');
            logContainer.innerHTML = '<p class="text-xs text-slate-400 italic">Loading logs...</p>';

            try {
                const logsRef = collection(db, 'tickets', ticketId, 'logs');
                const q = query(logsRef, orderBy('createdAt', 'asc'));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    logContainer.innerHTML = '<p class="text-xs text-slate-400 italic">No activity yet.</p>';
                    return;
                }

                logContainer.innerHTML = snapshot.docs.map(doc => {
                    const log = doc.data();
                    const date = log.createdAt ? new Date(log.createdAt.toDate()).toLocaleString() : '';
                    return `
                    <div class="flex gap-3">
                        <div class="size-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center shrink-0 font-bold text-xs">${(log.userName || 'U')[0]}</div>
                        <div class="bg-slate-100 dark:bg-slate-800 rounded-xl rounded-tl-none p-3 text-sm flex-1">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-slate-900 dark:text-white">${log.userName}</span>
                                <span class="text-[10px] text-slate-400">${date}</span>
                            </div>
                            <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${log.content}</p>
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                console.error(err);
            }
        }

        // --- Work Log Submit ---
        document.getElementById('add-log-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('new-log-content').value;
            if (!content || !currentTicketId) return;

            try {
                await addDoc(collection(db, 'tickets', currentTicketId, 'logs'), {
                    content,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email,
                    createdAt: serverTimestamp()
                });
                document.getElementById('new-log-content').value = '';
                loadWorkLogs(currentTicketId);
            } catch (err) {
                console.error("Error adding log", err);
            }
        });

        // --- Live Updates (Check change listeners for status/assignee) ---
        document.getElementById('detail-status-select').addEventListener('change', async (e) => {
            if (!currentTicketId) return;
            const newStatus = e.target.value;
            // Optimistic update
            const statusEl = document.getElementById('detail-status');
            statusEl.textContent = statusLabels[newStatus];
            statusEl.className = `px-2 py-0.5 rounded-full text-xs font-bold uppercase tracking-wider ${statusColors[newStatus]}`;

            await updateDoc(doc(db, 'tickets', currentTicketId), {
                status: newStatus,
                updatedAt: serverTimestamp()
            });

            // Refresh list in background
            loadTickets();
        });

        document.getElementById('detail-assignee-select').addEventListener('change', async (e) => {
            if (!currentTicketId) return;
            const newAssigneeId = e.target.value;
            let newAssigneeName = null;
            if (newAssigneeId) {
                const u = allUsers.find(u => u.id === newAssigneeId);
                newAssigneeName = u ? u.fullName : 'Unassigned';
            }

            await updateDoc(doc(db, 'tickets', currentTicketId), {
                assigneeId: newAssigneeId || null,
                assigneeName: newAssigneeName,
                updatedAt: serverTimestamp()
            });
            loadTickets();
        });

        async function deleteTicket(ticket) {
            try {
                // Delete attachments first
                if (ticket.attachments) {
                    for (const att of ticket.attachments) {
                        if (att.url.includes('firebasestorage')) {
                            const attRef = ref(storage, att.url);
                            await deleteObject(attRef).catch(e => console.warn('File delete failed', e));
                        }
                    }
                }

                // Delete logs subcollection ? (Batched write needed for perfect cleanup, but simple for now)
                // Firestore doesn't auto-delete subcollections. 
                // We'll leave logs or user Cloud Functions for standard practice, but to mimic "clear" we just delete parent doc usually.

                await deleteDoc(doc(db, 'tickets', ticket.id));
                window.closeDetailModal();
                loadTickets();
                showToast('Ticket deleted', 'success');
            } catch (err) {
                console.error("Delete ticket failed", err);
                alert("Could not delete ticket: " + err.message);
            }
        }

        // Search listener
        document.getElementById('search-tickets').addEventListener('input', () => renderTickets(tickets));
        document.getElementById('status-filter').addEventListener('change', () => renderTickets(tickets));

        // Add Attachment to Existing Ticket
        document.getElementById('add-attachment-input').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length || !currentTicketId) return;

            // Show loading state (simple toast or UI update)
            showToast('Uploading attachments...', 'info');

            try {
                const ticket = tickets.find(t => t.id === currentTicketId);
                let newAttachments = ticket.attachments || [];

                for (const file of files) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `ticket_${currentTicketId}_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.${fileExt}`;
                    const storageRef = ref(storage, `tickets/${fileName}`);
                    const snapshot = await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(snapshot.ref);
                    newAttachments.push({ name: file.name, url: url, type: file.type });
                }

                await updateDoc(doc(db, 'tickets', currentTicketId), {
                    attachments: newAttachments,
                    attachmentCount: newAttachments.length,
                    updatedAt: serverTimestamp()
                });

                // Refresh
                await loadTickets(); // Needed to update global list
                const updatedTicket = tickets.find(t => t.id === currentTicketId);
                // Re-render attachments part directly or reload detail
                renderAttachments(updatedTicket);

                // Also add a system log
                await addDoc(collection(db, 'tickets', currentTicketId, 'logs'), {
                    content: `Uploaded ${files.length} new attachment(s).`,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || currentUser.email,
                    createdAt: serverTimestamp()
                });
                loadWorkLogs(currentTicketId);

                showToast('Attachments added successfully', 'success');
                e.target.value = ''; // Reset input

            } catch (err) {
                console.error("Upload failed", err);
                showToast('Failed to upload attachment', 'error');
            }
        });

        function renderAttachments(ticket) {
            const attList = document.getElementById('detail-attachments-list');
            attList.innerHTML = '';
            if (ticket.attachments && ticket.attachments.length > 0) {
                ticket.attachments.forEach(att => {
                    attList.innerHTML += `<a href="${att.url}" target="_blank" class="flex items-center gap-2 px-3 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-sm hover:text-primary truncate max-w-[200px]">
                        <span class="material-symbols-outlined text-[16px]">attachment</span> ${att.name}
                    </a>`;
                });
            } else {
                attList.innerHTML = '<span class="text-xs text-slate-400 italic">No attachments</span>';
            }
        }

        function initListeners() {
            // Already set above
        }
    </script>
</body>

</html>
