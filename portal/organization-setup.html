<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Create Organization - Adhirat Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind Configuration -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4 sm:p-8">

    <!-- Auth Guard -->
    <script type="module">
        import { initAuthObserver } from '../assets/js/firebase-modules.js';
        initAuthObserver(true);
    </script>

    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-purple-600 mb-4 shadow-lg shadow-purple-500/20">
                <span class="material-symbols-outlined text-white text-3xl">domain</span>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Create Organization</h1>
            <p class="text-slate-400">Set up your workspace to start collaborating.</p>
        </div>

        <!-- Form Card -->
        <div class="bg-slate-800/50 backdrop-blur-xl rounded-2xl border border-slate-700 p-8 shadow-2xl">
            <form id="org-setup-form" class="space-y-6">

                <!-- Org Name -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Organization Name <span
                            class="text-red-400">*</span></label>
                    <input type="text" id="org-name" required placeholder="e.g. Acme Corp"
                        class="w-full px-4 py-3 rounded-xl border border-slate-600 bg-slate-900/50 text-white placeholder-slate-500 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors">
                </div>

                <!-- Employee ID Prefix -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Employee ID Prefix</label>
                    <div class="relative">
                        <input type="text" id="org-prefix" placeholder="e.g. ACME" maxlength="4"
                            style="text-transform: uppercase;"
                            class="w-full px-4 py-3 rounded-xl border border-slate-600 bg-slate-900/50 text-white placeholder-slate-500 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-xs text-slate-500">Max 4 Chars</div>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">Used for generating unique employee IDs (e.g. ACME00001).</p>
                </div>

                <!-- Logo Upload (Optional) -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Organization Logo</label>
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-xl bg-slate-900/50 border border-slate-600 flex items-center justify-center overflow-hidden"
                            id="logo-preview">
                            <span class="material-symbols-outlined text-slate-500">image</span>
                        </div>
                        <label class="cursor-pointer">
                            <span
                                class="px-4 py-2 rounded-lg border border-slate-600 text-slate-300 text-sm hover:bg-slate-700 transition-colors">Upload
                                Logo</span>
                            <input type="file" id="org-logo" accept="image/*" class="hidden">
                        </label>
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit" id="submit-btn"
                    class="w-full py-3.5 rounded-xl bg-gradient-to-r from-primary to-purple-600 text-white font-bold text-base hover:opacity-90 transition-all shadow-lg shadow-purple-500/25 flex items-center justify-center gap-2">
                    Create Workspace
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
                </button>
            </form>
        </div>

        <!-- Logout Option -->
        <div class="text-center mt-6">
            <button onclick="handleLogout()"
                class="text-slate-500 hover:text-white text-sm transition-colors flex items-center justify-center gap-2 mx-auto">
                <span class="material-symbols-outlined text-base">logout</span>
                Sign out
            </button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script type="module">
        import { createOrganization, uploadOrganizationLogo, getCurrentOrgId } from '../assets/js/firebase-modules.js';

        // Preview Logo
        const logoInput = document.getElementById('org-logo');
        const logoPreview = document.getElementById('logo-preview');
        let selectedFile = null;

        logoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    logoPreview.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // Form Submission
        document.getElementById('org-setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Creating...';

            const name = document.getElementById('org-name').value;
            const prefix = document.getElementById('org-prefix').value.toUpperCase();

            try {
                // 1. Create Org
                const result = await createOrganization({
                    name: name,
                    employeeIdPrefix: prefix || 'EMP'
                });

                if (result.success) {
                    // 2. Upload Logo if selected
                    if (selectedFile) {
                        try {
                            await uploadOrganizationLogo(selectedFile);
                        } catch (logoErr) {
                            console.warn("Logo upload failed but org created", logoErr);
                        }
                    }

                    showToast('Organization created successfully!', 'success');

                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    throw new Error(result.error);
                }

            } catch (error) {
                console.error(error);
                showToast(error.message || 'Failed to create organization', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function showToast(msg, type) {
            const t = document.createElement('div');
            t.className = `fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 z-50 ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'} text-white animate-fade-in-up`;
            t.innerHTML = `<span>${msg}</span>`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>

</html>
