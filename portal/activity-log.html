<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Activity Log - Adhirat Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
    <style>
        .log-row {
            transition: all 0.2s;
        }

        .log-row:hover {
            background-color: rgba(241, 245, 249, 0.5);
        }

        .dark .log-row:hover {
            background-color: rgba(30, 41, 59, 0.5);
        }
    </style>
</head>

<body
    class="pt-0 bg-background-light dark:bg-dark-bg text-slate-900 dark:text-white font-display antialiased overflow-hidden">
    <div class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar Navigation -->
        <div id="portal-sidebar" class="contents"></div>

        <!-- Main Content Wrapper -->
        <main class="flex-1 flex flex-col min-w-0">
            <!-- Top Header -->
            <div id="portal-header" class="contents"></div>

            <!-- Dashboard Content Scrollable Area -->
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 animate-fade-in-up">
                <div class="max-w-[1280px] mx-auto flex flex-col gap-8">
                    <!-- Page Heading -->
                    <div class="flex flex-col gap-1">
                        <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Activity Log</h1>
                        <p class="text-slate-500 dark:text-slate-400">Audit trail of system activities and user
                            operations.</p>
                    </div>

                    <!-- Filters -->
                    <div
                        class="bg-white dark:bg-dark-card rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 flex flex-col sm:flex-row gap-4 justify-between items-center z-10">
                        <div class="flex flex-wrap gap-4 w-full sm:w-auto">
                            <div class="relative w-full sm:w-64">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                                <input type="text" id="log-search" placeholder="Search logs..."
                                    class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 focus:ring-primary focus:border-transparent text-sm">
                            </div>
                            <select id="filter-action"
                                class="py-2 pl-3 pr-8 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm focus:ring-primary">
                                <option value="">All Actions</option>
                                <option value="LOGIN">Login</option>
                                <option value="LOGOUT">Logout</option>
                                <option value="CREATE">Create</option>
                                <option value="UPDATE">Update</option>
                                <option value="DELETE">Delete</option>
                            </select>
                            <select id="filter-module"
                                class="py-2 pl-3 pr-8 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm focus:ring-primary">
                                <option value="">All Modules</option>
                                <option value="AUTH">Authentication</option>
                                <option value="USERS">Users</option>
                                <option value="CALENDAR">Calendar</option>
                            </select>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="refreshLogs()"
                                class="p-2 text-slate-500 hover:text-primary transition-colors" title="Refresh">
                                <span class="material-symbols-outlined">refresh</span>
                            </button>
                        </div>
                    </div>

                    <!-- Logs Table -->
                    <div
                        class="bg-white dark:bg-dark-card rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden flex-1 flex flex-col min-h-0">
                        <div class="overflow-x-auto flex-1">
                            <table class="w-full text-left text-sm text-slate-500 dark:text-slate-400">
                                <thead
                                    class="bg-slate-50 dark:bg-[#1a202c] text-xs uppercase font-semibold text-slate-500 dark:text-slate-400 sticky top-0 z-0">
                                    <tr>
                                        <th class="px-6 py-3 whitespace-nowrap">Timestamp</th>
                                        <th class="px-6 py-3 whitespace-nowrap">User</th>
                                        <th class="px-6 py-3 whitespace-nowrap">Action</th>
                                        <th class="px-6 py-3 whitespace-nowrap">Module</th>
                                        <th class="px-6 py-3 w-full">Details</th>
                                    </tr>
                                </thead>
                                <tbody id="logs-table-body" class="divide-y divide-slate-200 dark:divide-border-dark">
                                    <tr>
                                        <td colspan="5" class="px-6 py-12 text-center">
                                            <span
                                                class="material-symbols-outlined text-4xl text-slate-400 animate-spin mb-2">progress_activity</span>
                                            <p>Loading logs...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div
                            class="px-6 py-3 border-t border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-dark-card flex justify-between items-center text-xs text-slate-500">
                            <span id="log-count">Showing 0 logs</span>
                            <!-- Pagination could go here -->
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script type="module">
        import { initAuthObserver, getCurrentOrgId } from '../assets/js/firebase-modules.js';
        import { db, collection, query, orderBy, limit, getDocs, where } from '../assets/js/firebase-config.js';
        import { initRBACGuard, PERMISSIONS } from '../assets/js/rbac.js';

        // Initialize RBAC (Require User View permissions as proxy for admin)
        initRBACGuard(['view_users']);

        let allLogs = [];

        // Load Logs
        async function loadLogs() {
            const tbody = document.getElementById('logs-table-body');
            tbody.innerHTML = `
                 <tr>
                    <td colspan="5" class="px-6 py-12 text-center">
                        <span class="material-symbols-outlined text-4xl text-slate-400 animate-spin mb-2">progress_activity</span>
                        <p>Loading activity history...</p>
                    </td>
                </tr>
            `;

            try {
                // Fetch last 100 logs (limit for performance)
                const q = query(collection(db, 'activity_logs'), where('orgId', '==', getCurrentOrgId()), orderBy('timestamp', 'desc'), limit(100));
                const snapshot = await getDocs(q);

                allLogs = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                renderLogs();
            } catch (error) {
                console.error("Error loading logs:", error);
                tbody.innerHTML = `
                     <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-red-500">
                            <span class="material-symbols-outlined text-4xl mb-2">error</span>
                            <p>Failed to load logs. You may not have permission.</p>
                        </td>
                    </tr>
                `;
            }
        }

        window.refreshLogs = loadLogs;

        function renderLogs() {
            const tbody = document.getElementById('logs-table-body');
            const search = document.getElementById('log-search').value.toLowerCase();
            const actionFilter = document.getElementById('filter-action').value;
            const moduleFilter = document.getElementById('filter-module').value;

            const filteredLogs = allLogs.filter(log => {
                if (actionFilter && log.action !== actionFilter) return false;
                if (moduleFilter && log.module !== moduleFilter) return false;

                if (search) {
                    const searchStr = `${log.userName} ${log.userEmail || ''} ${log.details}`.toLowerCase();
                    if (!searchStr.includes(search)) return false;
                }
                return true;
            });

            document.getElementById('log-count').textContent = `Showing ${filteredLogs.length} logs`;

            if (filteredLogs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center">
                            <span class="material-symbols-outlined text-4xl text-slate-400 mb-2">history_toggle_off</span>
                            <p class="text-slate-500">No logs found matching your criteria</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filteredLogs.map(log => {
                const date = log.timestamp ? log.timestamp.toDate() : new Date();
                const formattedDate = date.toLocaleString();
                const actionColor = getActionColor(log.action);

                return `
                    <tr class="log-row border-b border-slate-100 dark:border-slate-800 last:border-0 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                        <td class="px-6 py-3 whitespace-nowrap text-xs text-slate-500 font-mono">${formattedDate}</td>
                        <td class="px-6 py-3 whitespace-nowrap">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-600 dark:text-slate-300">
                                    ${(log.userName || '?').substring(0, 1).toUpperCase()}
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-sm font-medium text-slate-900 dark:text-white leading-none">${log.userName || 'Unknown'}</span>
                                    <span class="text-xs text-slate-400 leading-none mt-1">${log.userEmail || ''}</span>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${actionColor}">
                                ${log.action}
                            </span>
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap">
                            <span class="inline-flex items-center px-2 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-medium">
                                ${log.module}
                            </span>
                        </td>
                        <td class="px-6 py-3 text-sm text-slate-600 dark:text-slate-300 font-mono">
                            ${log.details}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getActionColor(action) {
            switch (action) {
                case 'LOGIN': return 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400';
                case 'LOGOUT': return 'bg-slate-100 text-slate-800 dark:bg-slate-700 dark:text-slate-300';
                case 'CREATE': return 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400';
                case 'UPDATE': return 'bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400';
                case 'DELETE': return 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400';
                default: return 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300';
            }
        }

        // Filter Listeners
        document.getElementById('log-search').addEventListener('input', renderLogs);
        document.getElementById('filter-action').addEventListener('change', renderLogs);
        document.getElementById('filter-module').addEventListener('change', renderLogs);

        // Init
        loadLogs();

    </script>
</body>

</html>
