<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Document Management - Adhirat Portal</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
    <style>
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .tab-active {
            border-bottom: 2px solid #8b5cf6;
            color: #8b5cf6;
        }
    </style>
</head>

<body
    class="pt-0 bg-background-light dark:bg-dark-bg text-slate-900 dark:text-white font-display antialiased overflow-hidden">
    <div class="flex h-screen w-full overflow-hidden">
        <div id="portal-sidebar" class="contents"></div>
        <main class="flex-1 flex flex-col min-w-0">
            <div id="portal-header" class="contents"></div>
            <div class="flex-1 overflow-y-auto p-4 sm:p-8 animate-fade-in-up">
                <div class="max-w-[1280px] mx-auto flex flex-col gap-8">
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-center">
                            <div>
                                <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Document
                                    Management</h1>
                                <p class="text-slate-500 dark:text-slate-400">Manage employee documents and letters.</p>
                            </div>
                            <button onclick="openComposer()" id="add-btn"
                                class="px-4 py-2 rounded-lg bg-primary text-white font-semibold flex items-center gap-2 hover:bg-blue-600 transition-colors shadow-lg shadow-primary/25 whitespace-nowrap">
                                <span class="material-symbols-outlined text-lg">add</span>
                                Create Document
                            </button>
                        </div>
                    </div>

                    <!-- Tabs -->
                    <div class="border-b border-slate-200 dark:border-slate-700 overflow-x-auto">
                        <nav class="flex space-x-8" aria-label="Tabs">
                            <button onclick="filterDocs('all')"
                                class="doc-tab tab-active whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
                                data-tab="all">All Documents</button>
                            <button onclick="filterDocs('offer')"
                                class="doc-tab whitespace-nowrap py-4 px-1 border-b-2 border-transparent font-medium text-sm text-slate-500 hover:text-slate-700 hover:border-slate-300 dark:text-slate-400 dark:hover:text-slate-300"
                                data-tab="offer">Offer Letters</button>
                            <button onclick="filterDocs('relieve')"
                                class="doc-tab whitespace-nowrap py-4 px-1 border-b-2 border-transparent font-medium text-sm text-slate-500 hover:text-slate-700 hover:border-slate-300 dark:text-slate-400 dark:hover:text-slate-300"
                                data-tab="relieve">Relieve Letters</button>
                            <button onclick="filterDocs('payslip')"
                                class="doc-tab whitespace-nowrap py-4 px-1 border-b-2 border-transparent font-medium text-sm text-slate-500 hover:text-slate-700 hover:border-slate-300 dark:text-slate-400 dark:hover:text-slate-300"
                                data-tab="payslip">Pay Slips</button>
                            <button onclick="filterDocs('compensation')"
                                class="doc-tab whitespace-nowrap py-4 px-1 border-b-2 border-transparent font-medium text-sm text-slate-500 hover:text-slate-700 hover:border-slate-300 dark:text-slate-400 dark:hover:text-slate-300"
                                data-tab="compensation">Compensation</button>
                        </nav>
                    </div>

                    <!-- List -->
                    <div
                        class="bg-white dark:bg-dark-card rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm text-slate-500 dark:text-slate-400">
                                <thead
                                    class="bg-slate-50 dark:bg-[#1a202c] text-xs uppercase font-semibold text-slate-500 dark:text-slate-400">
                                    <tr>
                                        <th class="px-6 py-3">Document Type</th>
                                        <th class="px-6 py-3">Employee</th>
                                        <th class="px-6 py-3">Date</th>
                                        <th class="px-6 py-3">Status</th>
                                        <th class="px-6 py-3 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body" class="divide-y divide-slate-200 dark:divide-border-dark">
                                    <tr>
                                        <td colspan="5" class="px-6 py-12 text-center">
                                            <span
                                                class="material-symbols-outlined text-4xl text-slate-400 animate-spin mb-2">progress_activity</span>
                                            <p>Loading documents...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Composer Modal -->
    <div id="composer-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-backdrop absolute inset-0" onclick="closeComposer()"></div>
        <div
            class="relative bg-white dark:bg-dark-card rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col border border-slate-200 dark:border-slate-700 animate-fade-in-up">
            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white" id="composer-title">New Document</h2>
                    <select id="doc-type-selector" onchange="changeDocType()"
                        class="rounded-lg border-slate-200 dark:border-slate-700 text-sm bg-slate-50 dark:bg-slate-900">
                        <option value="offer">Offer Letter</option>
                        <option value="relieve">Relieve Letter</option>
                        <option value="payslip">Pay Slip</option>
                        <option value="compensation">Compensation Letter</option>
                    </select>
                </div>
                <button onclick="closeComposer()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><span
                        class="material-symbols-outlined">close</span></button>
            </div>

            <!-- Body -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Editor (Left) -->
                <div class="w-1/2 p-6 overflow-y-auto border-r border-slate-200 dark:border-slate-700 space-y-4"
                    id="editor-panel">
                    <input type="hidden" id="doc-id">

                    <!-- Common Fields -->
                    <div>
                        <label class="block text-sm font-medium mb-1">Select Employee *</label>
                        <select id="doc-user"
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900"
                            onchange="updatePreview()">
                            <option value="">-- Select User --</option>
                        </select>
                    </div>

                    <!-- Dynamic Fields Container -->
                    <div id="dynamic-fields" class="space-y-4"></div>

                </div>

                <!-- Preview (Right) -->
                <div class="w-1/2 bg-slate-50 dark:bg-slate-900 p-8 overflow-y-auto flex items-start justify-center">
                    <div id="doc-preview"
                        class="bg-white text-slate-900 p-8 shadow-lg min-h-[297mm] w-full max-w-[210mm] text-sm leading-relaxed doc-paper">
                        <!-- Preview content here -->
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div
                class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 flex justify-end gap-3 bg-slate-50 dark:bg-slate-800/50">
                <button onclick="closeComposer()"
                    class="px-4 py-2 border rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">Cancel</button>
                <button onclick="saveDocument()"
                    class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 font-semibold shadow-lg">Save
                    Document</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, doc, setDoc, deleteDoc, updateDoc, serverTimestamp, query, orderBy, where } from '../assets/js/firebase-config.js';
        import { initAuthObserver } from '../assets/js/firebase-modules.js';

        initAuthObserver(true);

        let allDocs = [];
        let allUsers = [];
        let currentType = 'offer';

        // Initialize
        (async function () {
            await loadUsers();
            await loadDocuments();
        })();

        async function loadUsers() {
            try {
                const q = query(collection(db, 'users'), orderBy('email', 'asc'));
                const snap = await getDocs(q);
                allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const sel = document.getElementById('doc-user');
                sel.innerHTML = '<option value="">-- Select User --</option>' +
                    allUsers.map(u => `<option value="${u.id}">${u.email} (${u.fullName || 'No Name'})</option>`).join('');
            } catch (e) { console.error(e); }
        }

        async function loadDocuments() {
            try {
                const q = query(collection(db, 'hr_documents'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderDocs(allDocs);
            } catch (e) {
                document.getElementById('table-body').innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Error loading documents</td></tr>`;
            }
        }

        window.filterDocs = function (type) {
            document.querySelectorAll('.doc-tab').forEach(t => {
                t.classList.remove('tab-active', 'text-slate-900', 'dark:text-white', 'border-primary');
                t.classList.add('border-transparent');
                if (t.dataset.tab === type) {
                    t.classList.add('tab-active');
                    t.classList.remove('border-transparent');
                }
            });
            const filtered = type === 'all' ? allDocs : allDocs.filter(d => d.type === type);
            renderDocs(filtered);
        };

        function renderDocs(docs) {
            const tbody = document.getElementById('table-body');
            if (docs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-500">No documents found</td></tr>`;
                return;
            }
            tbody.innerHTML = docs.map(d => {
                const user = allUsers.find(u => u.id === d.userId);
                return `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                    <td class="px-6 py-4 capitalize font-medium">${d.type.replace('-', ' ')}</td>
                    <td class="px-6 py-4 text-sm">
                        <div class="font-medium dark:text-white">${user?.fullName || 'Unknown'}</div>
                        <div class="text-xs text-slate-500">${user?.email || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-sm">${d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleDateString() : '-'}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">Saved</span></td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="editDoc('${d.id}')" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-primary"><span class="material-symbols-outlined">edit</span></button>
                        <button onclick="deleteDocItem('${d.id}')" class="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 rounded text-red-500"><span class="material-symbols-outlined">delete</span></button>
                    </td>
                </tr>`;
            }).join('');
        }

        // Composer Logic
        const fieldConfigs = {
            offer: [
                { id: 'role', label: 'Role / Position', type: 'text' },
                { id: 'salary', label: 'Annual Salary', type: 'text' },
                { id: 'startDate', label: 'Start Date', type: 'date' },
                { id: 'manager', label: 'Reporting Manager', type: 'text' }
            ],
            relieve: [
                { id: 'role', label: 'Last Position', type: 'text' },
                { id: 'lastDate', label: 'Last Working Day', type: 'date' },
                { id: 'reason', label: 'Reason (Optional)', type: 'text' }
            ],
            payslip: [
                { id: 'month', label: 'Month/Year', type: 'month' },
                { id: 'basic', label: 'Basic Salary', type: 'number' },
                { id: 'hra', label: 'HRA', type: 'number' },
                { id: 'allowance', label: 'Special Allowance', type: 'number' },
                { id: 'deductions', label: 'Total Deductions', type: 'number' }
            ],
            compensation: [
                { id: 'oldSalary', label: 'Current Salary', type: 'number' },
                { id: 'newSalary', label: 'Revised Salary', type: 'number' },
                { id: 'effectiveDate', label: 'Effective Date', type: 'date' }
            ]
        };

        window.openComposer = function (id = null) {
            document.getElementById('composer-modal').classList.remove('hidden');
            document.getElementById('doc-id').value = '';
            document.getElementById('doc-user').value = '';

            if (id) {
                const docData = allDocs.find(d => d.id === id);
                if (docData) {
                    document.getElementById('doc-id').value = id;
                    document.getElementById('doc-type-selector').value = docData.type;
                    document.getElementById('doc-user').value = docData.userId;
                    changeDocType(docData.type, docData.data);
                }
            } else {
                changeDocType('offer');
            }
        };

        window.closeComposer = function () {
            document.getElementById('composer-modal').classList.add('hidden');
        };

        window.changeDocType = function (type = null, data = {}) {
            currentType = type || document.getElementById('doc-type-selector').value;
            const fields = fieldConfigs[currentType] || [];
            const container = document.getElementById('dynamic-fields');

            container.innerHTML = fields.map(f => `
                <div>
                    <label class="block text-sm font-medium mb-1">${f.label}</label>
                    <input type="${f.type}" id="field-${f.id}" value="${data[f.id] || ''}" class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900" oninput="updatePreview()">
                </div>
            `).join('');

            updatePreview();
        };

        window.updatePreview = function () {
            const userId = document.getElementById('doc-user').value;
            const user = allUsers.find(u => u.id === userId) || { fullName: '[Employee Name]', email: '[Email]' };
            const preview = document.getElementById('doc-preview');

            // Gather field values
            const data = {};
            (fieldConfigs[currentType] || []).forEach(f => {
                data[f.id] = document.getElementById(`field-${f.id}`)?.value || `[${f.label}]`;
            });

            // Templates
            const today = new Date().toLocaleDateString('en-US', { dateStyle: 'long' });
            let html = '';

            if (currentType === 'offer') {
                html = `
                    <div class="text-right text-xs text-slate-500 mb-8">${today}</div>
                    <h1 class="text-2xl font-bold mb-4 text-center">OFFER OF EMPLOYMENT</h1>
                    <p class="mb-4">Dear <strong>${user.fullName}</strong>,</p>
                    <p class="mb-4">We are pleased to offer you the position of <strong>${data.role}</strong> at Adhirat Technologies. We believe your skills and experience will be an excellent asset to our team.</p>
                    <div class="my-6 p-4 border rounded bg-slate-50">
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <span class="text-slate-500">Annual Salary:</span> <strong>${data.salary}</strong>
                            <span class="text-slate-500">Start Date:</span> <strong>${data.startDate}</strong>
                            <span class="text-slate-500">Reporting To:</span> <strong>${data.manager}</strong>
                        </div>
                    </div>
                    <p class="mb-8">Please sign and return this letter by [Date] to confirm your acceptance.</p>
                    <div class="mt-12 border-t pt-2 w-48 text-center text-xs text-slate-500">Authorized Signature</div>
                `;
            } else if (currentType === 'relieve') {
                html = `
                    <div class="text-right text-xs text-slate-500 mb-8">${today}</div>
                    <h1 class="text-2xl font-bold mb-4 text-center">RELIEVING LETTER</h1>
                    <p class="mb-4">To <strong>${user.fullName}</strong>,</p>
                    <p class="mb-4">This is to accept your resignation from the position of <strong>${data.role}</strong>. Your last working day with Adhirat Technologies was <strong>${data.lastDate}</strong>.</p>
                    <p class="mb-4">We thank you for your services and wish you all the best in your future endeavors.</p>
                    <div class="mt-12 border-t pt-2 w-48 text-center text-xs text-slate-500">HR Manager</div>
                `;
            } else if (currentType === 'payslip') {
                const totalEarnings = (Number(data.basic) + Number(data.hra) + Number(data.allowance)) || 0;
                const netPay = totalEarnings - (Number(data.deductions) || 0);

                html = `
                    <div class="text-center mb-6">
                        <h2 class="font-bold text-xl">Adhirat Technologies</h2>
                        <h3 class="text-sm uppercase tracking-wide">Payslip for ${data.month}</h3>
                    </div>
                    <div class="mb-6 flex justify-between text-sm border-b pb-4">
                        <div><strong>Employee:</strong> ${user.fullName}</div>
                        <div><strong>Email:</strong> ${user.email}</div>
                    </div>
                    <table class="w-full text-sm mb-6 border-collapse border border-slate-200">
                        <thead>
                            <tr class="bg-slate-100">
                                <th class="border p-2 text-left">Earnings</th>
                                <th class="border p-2 text-right">Amount</th>
                                <th class="border p-2 text-left">Deductions</th>
                                <th class="border p-2 text-right">Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="border p-2">Basic Salary</td><td class="border p-2 text-right">${data.basic}</td>
                                <td class="border p-2">Total Deductions</td><td class="border p-2 text-right">${data.deductions}</td>
                            </tr>
                            <tr>
                                <td class="border p-2">HRA</td><td class="border p-2 text-right">${data.hra}</td>
                                <td class="border p-2"></td><td class="border p-2"></td>
                            </tr>
                            <tr>
                                <td class="border p-2">Allowance</td><td class="border p-2 text-right">${data.allowance}</td>
                                <td class="border p-2"></td><td class="border p-2"></td>
                            </tr>
                            <tr class="font-bold bg-slate-50">
                                <td class="border p-2">Gross Earnings</td><td class="border p-2 text-right">${totalEarnings}</td>
                                <td class="border p-2">Net Pay</td><td class="border p-2 text-right text-lg">${netPay}</td>
                            </tr>
                        </tbody>
                    </table>
                `;
            } else if (currentType === 'compensation') {
                const percent = data.oldSalary > 0 ? ((data.newSalary - data.oldSalary) / data.oldSalary * 100).toFixed(1) : 0;
                html = `
                     <div class="text-right text-xs text-slate-500 mb-8">${today}</div>
                    <h1 class="text-2xl font-bold mb-4 text-center">COMPENSATION REVISION</h1>
                    <p class="mb-4">Dear <strong>${user.fullName}</strong>,</p>
                    <p class="mb-4">In recognition of your performance, we are pleased to revise your compensation package effective from <strong>${data.effectiveDate}</strong>.</p>
                    <div class="my-6 p-6 border rounded-xl bg-slate-50">
                        <div class="flex justify-between items-center mb-2">
                             <span class="text-slate-500">Previous CTC:</span> <strong>${data.oldSalary}</strong>
                        </div>
                        <div class="flex justify-between items-center text-lg text-primary">
                             <span class="font-bold">Revised CTC:</span> <strong>${data.newSalary}</strong>
                        </div>
                        <div class="mt-2 text-xs text-green-600 font-bold">Total Increase: ${percent}%</div>
                    </div>
                     <div class="mt-12 border-t pt-2 w-48 text-center text-xs text-slate-500">Authorized Signature</div>
                `;
            }

            preview.innerHTML = html;
        };

        window.saveDocument = async function () {
            const id = document.getElementById('doc-id').value;
            const userId = document.getElementById('doc-user').value;
            if (!userId) { alert('Please select a user'); return; }

            const fields = fieldConfigs[currentType] || [];
            const data = {};
            fields.forEach(f => {
                data[f.id] = document.getElementById(`field-${f.id}`).value;
            });

            const docPayload = {
                type: currentType,
                userId: userId,
                data: data,
                updatedAt: serverTimestamp()
            };

            if (id) {
                await updateDoc(doc(db, 'hr_documents', id), docPayload);
            } else {
                docPayload.createdAt = serverTimestamp();
                await setDoc(doc(collection(db, 'hr_documents')), docPayload);
            }

            closeComposer();
            loadDocuments();
            // Simple toast logic reuse if available or alert
            // showToast('Document saved!', 'success');
        };

        window.editDoc = function (id) {
            openComposer(id);
        }

        window.deleteDocItem = async function (id) {
            if (confirm('Delete this document?')) {
                await deleteDoc(doc(db, 'hr_documents', id));
                loadDocuments();
            }
        }
    </script>
</body>

</html>
