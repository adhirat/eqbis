name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: Migrate DB + Deploy to Cloudflare Pages (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=@eqbis/web

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Run DB migrations (Neon staging branch)
        run: npm run db:migrate
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Build for Cloudflare Pages
        run: npm run build:cf --workspace=@eqbis/web
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.STAGING_BETTER_AUTH_SECRET }}
          NEXT_PUBLIC_APP_URL: https://staging.eqbis.com
          ROOT_DOMAIN: staging.eqbis.com

      - name: Deploy to Cloudflare Pages (staging branch)
        run: |
          npx wrangler pages deploy apps/web/.vercel/output/static \
            --project-name=eqbis-web \
            --branch=staging \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
