name: Deploy Web — Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel in-flight prod deploys

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run tsc:check -w apps/web

      - name: Apply D1 migrations (production)
        run: |
          npx wrangler d1 migrations apply eqbis-db \
            --remote \
            --env production \
            --config apps/web/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker (production)
        # deploy:prod already runs build:css internally
        run: npm run deploy:prod -w apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deployment summary
        run: echo "✅ Deployed to eqbis.com"
