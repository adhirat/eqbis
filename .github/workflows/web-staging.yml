name: Deploy Web — Staging

on:
  push:
    branches: [staging]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run tsc:check -w apps/web

      - name: Apply D1 migrations (staging)
        run: |
          npx wrangler d1 migrations apply eqbis-db-staging \
            --remote \
            --env staging \
            --config apps/web/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker (staging)
        # deploy:staging already runs build:css internally
        run: npm run deploy:staging -w apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deployment summary
        run: echo "✅ Deployed to eqbis-web-staging.workers.dev"
