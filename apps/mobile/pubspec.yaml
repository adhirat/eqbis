name: eqbis_mobile
description: Eqbis — All-in-One Business Platform mobile app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Secure storage for session tokens
  flutter_secure_storage: ^9.2.2

  # Shared preferences
  shared_preferences: ^2.3.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
