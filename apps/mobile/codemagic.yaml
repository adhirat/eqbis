workflows:

  # ── Staging: triggered on push to `staging` branch ──────────────────────
  staging-mobile:
    name: Staging — Flutter Build (APK)
    triggering:
      events: [push]
      branch_patterns:
        - pattern: staging
          include: true
    environment:
      flutter: stable
      vars:
        API_BASE_URL: https://staging.eqbis.com
    scripts:
      - name: Install dependencies
        script: flutter pub get
        working_directory: apps/mobile
      - name: Run tests
        script: flutter test
        working_directory: apps/mobile
      - name: Build Android APK (debug)
        script: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=$API_BASE_URL
        working_directory: apps/mobile
    artifacts:
      - apps/mobile/build/app/outputs/flutter-apk/*.apk

  # ── Production: triggered on push to `main` branch ──────────────────────
  production-mobile:
    name: Production — Flutter Build (AAB + IPA)
    triggering:
      events: [push]
      branch_patterns:
        - pattern: main
          include: true
    environment:
      flutter: stable
      android_signing:
        - eqbis_keystore          # Upload keystore in Codemagic dashboard
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.eqbis.mobile
      vars:
        API_BASE_URL: https://eqbis.com
    scripts:
      - name: Install dependencies
        script: flutter pub get
        working_directory: apps/mobile
      - name: Run tests
        script: flutter test
        working_directory: apps/mobile
      - name: Build Android release AAB
        script: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=$API_BASE_URL
        working_directory: apps/mobile
      - name: Build iOS release IPA
        script: |
          flutter build ipa --release \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --export-options-plist=/Users/builder/export_options.plist
        working_directory: apps/mobile
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
    artifacts:
      - apps/mobile/build/app/outputs/bundle/release/*.aab
      - apps/mobile/build/ios/ipa/*.ipa
