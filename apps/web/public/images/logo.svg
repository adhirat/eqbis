<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!--
    Eqbis — Isometric 3×3×3 cube puzzle logo
    Projection: a=10, b=5, c=12, cx=60, cy=55
    iso(gx,gy,gz) = ((gx-gy)*10+60, (gx+gy)*5-gz*12+55)
  -->

  <!-- ── Top faces (blue gradient, lighter → darker front-left to back-right) ── -->
  <polygon points="60,19 70,24 60,29 50,24" fill="#93c5fd" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="70,24 80,29 70,34 60,29" fill="#60a5fa" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="80,29 90,34 80,39 70,34" fill="#3b82f6" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="50,24 60,29 50,34 40,29" fill="#60a5fa" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="60,29 70,34 60,39 50,34" fill="#3b82f6" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="70,34 80,39 70,44 60,39" fill="#2563eb" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="40,29 50,34 40,39 30,34" fill="#3b82f6" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="50,34 60,39 50,44 40,39" fill="#2563eb" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="60,39 70,44 60,49 50,44" fill="#1d4ed8" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- ── Right faces (dark blue, lighter top → darker bottom) ── -->
  <polygon points="60,31 70,36 70,24 60,19" fill="#2563eb" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="70,36 80,41 80,29 70,24" fill="#1d4ed8" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="80,41 90,46 90,34 80,29" fill="#1e40af" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="60,43 70,48 70,36 60,31" fill="#1d4ed8" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="70,48 80,53 80,41 70,36" fill="#1e40af" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="80,53 90,58 90,46 80,41" fill="#1e3a8a" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="60,55 70,60 70,48 60,43" fill="#1e40af" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="70,60 80,65 80,53 70,48" fill="#1e3a8a" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="80,65 90,70 90,58 80,53" fill="#172554" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- ── Left faces (violet gradient, lighter top-front → darker bottom-back) ── -->
  <polygon points="60,31 50,36 50,24 60,19" fill="#c4b5fd" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="50,36 40,41 40,29 50,24" fill="#a78bfa" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="40,41 30,46 30,34 40,29" fill="#8b5cf6" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="60,43 50,48 50,36 60,31" fill="#a78bfa" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="50,48 40,53 40,41 50,36" fill="#8b5cf6" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="40,53 30,58 30,46 40,41" fill="#7c3aed" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="60,55 50,60 50,48 60,43" fill="#8b5cf6" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="50,60 40,65 40,53 50,48" fill="#7c3aed" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
  <polygon points="40,65 30,70 30,58 40,53" fill="#6d28d9" stroke="#0f172a" stroke-width="0.7" stroke-linejoin="round"/>
</svg>
