name = "eqbis-web"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Production R2 bucket
[[r2_buckets]]
binding = "R2"
bucket_name = "eqbis-assets"

# Staging overrides
[env.staging]
[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "eqbis-staging"
